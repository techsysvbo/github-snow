name: Send PR Payload to ServiceNow

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request Number"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  send-to-snow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.SN_INSTANCE_URL }}" ]; then
            echo "SN_INSTANCE_URL is missing"
            exit 1
          fi

          if [ -z "${{ secrets.SN_API_PATH }}" ]; then
            echo "SN_API_PATH is missing"
            exit 1
          fi

          if [ -z "${{ secrets.SN_API_USER }}" ]; then
            echo "SN_API_USER is missing"
            exit 1
          fi

          if [ -z "${{ secrets.SN_API_PASSWORD }}" ]; then
            echo "SN_API_PASSWORD is missing"
            exit 1
          fi

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt(core.getInput('pr_number', { required: true }), 10);
            const { owner, repo } = context.repo;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });

            const rawPayload = {
              pr_number: pr.number,
              pr_title: pr.title || "",
              pr_url: pr.html_url || "",
              repository: repo,
              repo_owner: owner,
              source_branch: pr.head.ref || "",
              target_branch: pr.base.ref || "",
              commit_sha: pr.head.sha || "",
              pr_author: pr.user?.login || "",
              pr_state: pr.state || "",
              mergeable: pr.mergeable === null ? "unknown" : String(pr.mergeable),
              requested_by: context.actor || "",
              triggered_at: new Date().toISOString(),
              environment: pr.base.ref === "main" ? "prod" : "non-prod"
            };

            const payload = {
              u_pr_number: pr.number,
              u_pr_title: pr.title || "",
              u_pr_url: pr.html_url || "",
              u_repository: repo,
              u_repo_owner: owner,
              u_source_branch: pr.head.ref || "",
              u_target_branch: pr.base.ref || "",
              u_commit_sha: pr.head.sha || "",
              u_pr_author: pr.user?.login || "",
              u_pr_state: pr.state || "",
              u_mergeable: pr.mergeable === null ? "unknown" : String(pr.mergeable),
              u_requested_by: context.actor || "",
              u_triggered_at: new Date().toISOString(),
              u_environment: pr.base.ref === "main" ? "prod" : "non-prod",
              u_status: "submitted",
              u_payload_json: JSON.stringify(rawPayload)
            };

            core.setOutput("payload", JSON.stringify(payload));

      - name: Print payload
        run: |
          echo '${{ steps.pr.outputs.payload }}'

      - name: Send payload to ServiceNow
        run: |
          API_URL="${{ secrets.SN_INSTANCE_URL }}${{ secrets.SN_API_PATH }}"
          echo "Calling: $API_URL"

          cat > payload.json <<'EOF'
          ${{ steps.pr.outputs.payload }}
          EOF

          HTTP_RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "$API_URL" \
            --user "${{ secrets.SN_API_USER }}:${{ secrets.SN_API_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @payload.json)

          echo "HTTP Status: $HTTP_RESPONSE"
          cat response.json

          if [ "$HTTP_RESPONSE" -lt 200 ] || [ "$HTTP_RESPONSE" -ge 300 ]; then
            echo "ServiceNow API call failed"
            exit 1
          fi

      - name: Upload response artifact
        uses: actions/upload-artifact@v4
        with:
          name: snow-response
          path: response.json
