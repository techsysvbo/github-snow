name: Send PR Payload to ServiceNow

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  send-to-snow:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if payload was already sent
        id: labelcheck
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            const alreadySent = labels.includes('snow-payload-sent');
            core.setOutput('already_sent', alreadySent ? 'true' : 'false');

      - name: Stop if payload was already sent
        if: steps.labelcheck.outputs.already_sent == 'true'
        run: |
          echo "Payload already sent to ServiceNow for this PR."
          exit 0

      - name: Set ServiceNow approval status to pending
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha: pr.head.sha,
              state: 'pending',
              context: 'servicenow/prod-approval',
              description: 'Waiting for ServiceNow approval',
              target_url: pr.html_url
            });

      - name: Build payload JSON
        run: |
          cat > payload.json <<EOF
          {
            "pr_number": ${{ github.event.pull_request.number }},
            "pr_url": "${{ github.event.pull_request.html_url }}",
            "repo_name": "${{ github.event.repository.name }}",
            "repo_owner": "${{ github.repository_owner }}",
            "source_branch": "${{ github.event.pull_request.head.ref }}",
            "target_branch": "${{ github.event.pull_request.base.ref }}",
            "commit_sha": "${{ github.event.pull_request.head.sha }}",
            "pr_title": "${{ github.event.pull_request.title }}",
            "pr_author": "${{ github.event.pull_request.user.login }}",
            "requested_at": "${{ github.event.pull_request.updated_at }}",
            "environment": "production",
            "external_correlation_id": "${{ github.event.repository.name }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}"
          }
          EOF

          echo "Payload created:"
          cat payload.json

      - name: Send payload to ServiceNow
        env:
          SNOW_URL: ${{ secrets.SNOW_URL }}
          SNOW_USER: ${{ secrets.SNOW_USER }}
          SNOW_PASSWORD: ${{ secrets.SNOW_PASSWORD }}
        run: |
          echo "Sending payload to ServiceNow..."
          HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST "$SNOW_URL" \
            -u "$SNOW_USER:$SNOW_PASSWORD" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response:"
          cat response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "ServiceNow call failed."
            exit 1
          fi

      - name: Add label to PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['snow-payload-sent']
            });

      - name: Add PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: 'Payload sent to ServiceNow. Waiting for ServiceNow approval before merge.'
            });
