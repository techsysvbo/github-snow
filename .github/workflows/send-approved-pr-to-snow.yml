# 7-year-old explanation:
# After one reviewer approves the PR, GitHub first checks if Terraform checks passed.
# If Terraform checks passed, GitHub sends the request to ServiceNow.
# If Terraform checks are not ready yet, GitHub waits a little before giving up.

# Expert explanation:
# This workflow runs on pull_request_review approval.
# It polls GitHub check-runs for terraform-checks to avoid timing/race issues.
# It sets snow-approval to pending and sends the approval payload to ServiceNow /webhook.

name: Send Approved PR to SNOW Webhook

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: read
  statuses: write
  checks: read

env:
  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_API_PATH: ${{ secrets.SN_API_PATH }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

jobs:
  send-to-snow-webhook:
    name: send-to-snow-webhook
    runs-on: ubuntu-latest

    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main'

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Confirm Terraform checks passed
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const sha = pr.head.sha;

            const requiredCheckName = "terraform-checks";
            let check = null;

            // Wait up to 60 seconds because PR approval can happen before GitHub finishes indexing check runs.
            for (let attempt = 1; attempt <= 12; attempt++) {
              const { data } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha
              });

              check = data.check_runs.find(c => c.name === requiredCheckName);

              if (check) {
                core.info(`Found ${requiredCheckName}. Status=${check.status}; Conclusion=${check.conclusion}`);
                break;
              }

              core.info(`Attempt ${attempt}: ${requiredCheckName} not found yet. Waiting 5 seconds...`);
              await new Promise(resolve => setTimeout(resolve, 5000));
            }

            if (!check) {
              core.setFailed(`${requiredCheckName} was not found for commit ${sha}. Make sure Terraform PR Checks ran on the latest PR commit.`);
              return;
            }

            if (check.status !== "completed") {
              core.setFailed(`${requiredCheckName} is not completed yet. Current status: ${check.status}`);
              return;
            }

            if (check.conclusion !== "success") {
              core.setFailed(`${requiredCheckName} is not successful. Current conclusion: ${check.conclusion}`);
              return;
            }

            core.info(`${requiredCheckName} passed successfully.`);

      - name: Set SNOW approval status to pending
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state: "pending",
              context: "snow-approval",
              description: "Waiting for ServiceNow approval",
              target_url: pr.html_url
            });

      - name: Send PR payload to ServiceNow webhook
        run: |
          FULL_SN_URL="${SN_INSTANCE_URL}${SN_API_PATH}"

          echo "Sending payload to ServiceNow webhook..."
          echo "URL: ${FULL_SN_URL}"

          curl -sS -X POST "$FULL_SN_URL" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"event_type\": \"pull_request_review_approved\",
              \"owner\": \"${{ github.repository_owner }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"pr_number\": \"${{ github.event.pull_request.number }}\",
              \"pr_url\": \"${{ github.event.pull_request.html_url }}\",
              \"pr_link\": \"${{ github.event.pull_request.html_url }}\",
              \"pr_title\": \"${{ github.event.pull_request.title }}\",
              \"source_branch\": \"${{ github.event.pull_request.head.ref }}\",
              \"target_branch\": \"${{ github.event.pull_request.base.ref }}\",
              \"commit_sha\": \"${{ github.event.pull_request.head.sha }}\",
              \"requester\": \"${{ github.event.pull_request.user.login }}\",
              \"requestor_github_username\": \"${{ github.event.pull_request.user.login }}\",
              \"approvers\": [\"${{ github.event.review.user.login }}\"],
              \"sme_approval_1\": \"${{ github.event.review.user.login }}\",
              \"status\": \"waiting_for_snow\",
              \"approval_state\": \"requested\",
              \"status_context\": \"snow-approval\",
              \"github_check_status\": \"success\",
              \"github_checks_status\": \"PASSED\",
              \"terraform_fmt\": \"PASSED\",
              \"terraform_validate\": \"PASSED\",
              \"checkov_scan_result\": \"PASSED\",
              \"security_scan_result\": \"PASSED\",
              \"pipeline_run_id\": \"${{ github.run_id }}\",
              \"pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"environment\": \"lab\",
              \"impact_summary\": \"Lab Terraform change submitted for ServiceNow approval.\",
              \"rollback_plan\": \"Revert PR or run Terraform rollback plan if needed.\"
            }"
