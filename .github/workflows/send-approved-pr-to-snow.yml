name: Send Approved PR to ServiceNow

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  send-to-snow:
    name: Send approved PR to ServiceNow

    # Run only when a PR targeting main receives an approval.
    if: >-
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'

    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Checkout approved PR commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Configure trusted CA bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No trusted CA bundle found on the runner."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Collect and validate PR security checks
        id: github_data
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            > pr.json

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            > check-runs.json

          python3 <<'PY'
          import json
          import sys
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          check_payload = json.loads(Path("check-runs.json").read_text())
          check_runs = check_payload.get("check_runs", [])

          def normalize(value):
              return (value or "").strip().lower()

          def result_from_run(run):
              status = normalize(run.get("status"))
              conclusion = normalize(run.get("conclusion"))

              if conclusion == "success":
                  return "PASSED"

              if conclusion in (
                  "failure",
                  "cancelled",
                  "timed_out",
                  "action_required",
                  "startup_failure",
              ):
                  return "FAILED"

              if conclusion in ("skipped", "neutral"):
                  return "SKIPPED"

              if status in (
                  "queued",
                  "in_progress",
                  "waiting",
                  "requested",
                  "pending",
              ):
                  return "PENDING"

              return "MISSING"

          def latest_result(required_name):
              matches = [
                  run
                  for run in check_runs
                  if normalize(run.get("name")) == normalize(required_name)
              ]

              if not matches:
                  return {
                      "name": required_name,
                      "result": "MISSING",
                      "status": "",
                      "conclusion": "",
                      "html_url": "",
                  }

              matches.sort(
                  key=lambda run: (
                      run.get("completed_at")
                      or run.get("started_at")
                      or run.get("created_at")
                      or ""
                  )
              )

              latest = matches[-1]

              return {
                  "name": latest.get("name", required_name),
                  "result": result_from_run(latest),
                  "status": latest.get("status", ""),
                  "conclusion": latest.get("conclusion", ""),
                  "html_url": latest.get("html_url", ""),
              }

          checks = {
              "checkov": latest_result("checkov"),
              "codeql": latest_result("codeql"),
              "gitleaks": latest_result("gitleaks"),
              "terraform_checks_dev": latest_result("terraform-checks (dev)"),
              "terraform_checks_prod": latest_result("terraform-checks (prod)"),
          }

          required_results = [
              checks["checkov"]["result"],
              checks["codeql"]["result"],
              checks["gitleaks"]["result"],
              checks["terraform_checks_dev"]["result"],
              checks["terraform_checks_prod"]["result"],
          ]

          if all(result in ("PASSED", "SKIPPED") for result in required_results):
              overall_status = "success"
          elif any(result == "FAILED" for result in required_results):
              overall_status = "failure"
          else:
              overall_status = "pending"

          print(f"Checkov: {checks['checkov']['result']}")
          print(f"CodeQL: {checks['codeql']['result']}")
          print(f"Gitleaks: {checks['gitleaks']['result']}")
          print(f"Terraform dev: {checks['terraform_checks_dev']['result']}")
          print(f"Terraform prod: {checks['terraform_checks_prod']['result']}")

          if overall_status != "success":
              print(
                  "Technical checks are not all successful. "
                  "ServiceNow payload will not be sent.",
                  file=sys.stderr,
              )
              sys.exit(1)

          context = {
              "pr_number": pr.get("number", 0),
              "pr_link": pr.get("html_url", ""),
              "pr_title": pr.get("title", ""),
              "source_branch": pr.get("head", {}).get("ref", ""),
              "target_branch": pr.get("base", {}).get("ref", ""),
              "head_sha": pr.get("head", {}).get("sha", ""),
              "base_sha": pr.get("base", {}).get("sha", ""),
              "pr_author": pr.get("user", {}).get("login", ""),
              "pr_state": pr.get("state", ""),
              "requested_by": pr.get("user", {}).get("login", ""),
              "mergeable": (
                  ""
                  if pr.get("mergeable") is None
                  else str(pr.get("mergeable")).lower()
              ),
              "mergeable_state": pr.get("mergeable_state", ""),
              "closed_at": pr.get("closed_at") or "",
              "merged_at": pr.get("merged_at") or "",
              "github_checks_status": overall_status,
              "checkov_scan_result": checks["checkov"]["result"],
              "codeql_scan_result": checks["codeql"]["result"],
              "gitleaks_scan_result": checks["gitleaks"]["result"],
              "terraform_dev_result": checks["terraform_checks_dev"]["result"],
              "terraform_prod_result": checks["terraform_checks_prod"]["result"],
              "terraform_validate": "PASSED",
              "security_scan_result": "PASSED",
              "github_checks_detail": checks,
          }

          Path("snow-context.json").write_text(
              json.dumps(context, indent=2)
          )
          PY

      - name: Get ServiceNow OAuth token
        id: token
        shell: bash
        env:
          SN_OAUTH_TOKEN_URL: ${{ secrets.SN_OAUTH_TOKEN_URL }}
          SN_OAUTH_CLIENT_ID: ${{ secrets.SN_OAUTH_CLIENT_ID }}
          SN_OAUTH_CLIENT_SECRET: ${{ secrets.SN_OAUTH_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          for item in \
            SN_OAUTH_TOKEN_URL \
            SN_OAUTH_CLIENT_ID \
            SN_OAUTH_CLIENT_SECRET
          do
            if [ -z "${!item:-}" ]; then
              echo "Missing GitHub secret: ${item}"
              exit 1
            fi
          done

          if [[ "${SN_OAUTH_TOKEN_URL}" != https://* ]]; then
            echo "SN_OAUTH_TOKEN_URL must use HTTPS."
            exit 1
          fi

          echo "Requesting ServiceNow OAuth token with client_credentials."

          TOKEN_FILE="$(mktemp)"
          trap 'rm -f "${TOKEN_FILE}"' EXIT

          set +e

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              --proto '=https' \
              --tlsv1.2 \
              --connect-timeout 20 \
              --max-time 90 \
              --output "${TOKEN_FILE}" \
              --write-out "%{http_code}" \
              --request POST \
              --url "${SN_OAUTH_TOKEN_URL}" \
              --header "Content-Type: application/x-www-form-urlencoded" \
              --header "Accept: application/json" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=${SN_OAUTH_CLIENT_ID}" \
              --data-urlencode "client_secret=${SN_OAUTH_CLIENT_SECRET}"
          )"

          CURL_EXIT=$?

          set -e

          echo "ServiceNow OAuth HTTP status: ${HTTP_STATUS:-no-response}"

          if [ "${CURL_EXIT}" -ne 0 ] && [ "${CURL_EXIT}" -ne 22 ]; then
            echo "OAuth connection failed before ServiceNow returned a usable response."
            echo "curl exit code: ${CURL_EXIT}"
            exit "${CURL_EXIT}"
          fi

          if [[ ! "${HTTP_STATUS}" =~ ^2[0-9][0-9]$ ]]; then
            echo "ServiceNow rejected the OAuth request."

            python3 - "${TOKEN_FILE}" <<'PY'
            import json
            import sys
            from pathlib import Path

            raw = Path(sys.argv[1]).read_text(errors="replace")

            try:
                data = json.loads(raw)
                message = (
                    data.get("error_description")
                    or data.get("error")
                    or data.get("message")
                    or "No error message returned."
                )
                print(f"OAuth error: {str(message)[:500]}")
            except Exception:
                print("ServiceNow returned a non-JSON OAuth error response.")
            PY

            exit 1
          fi

          ACCESS_TOKEN="$(
            python3 - "${TOKEN_FILE}" <<'PY'
            import json
            import sys
            from pathlib import Path

            raw = Path(sys.argv[1]).read_text()

            try:
                response = json.loads(raw)
            except Exception:
                print(
                    "ServiceNow OAuth response was not valid JSON.",
                    file=sys.stderr,
                )
                sys.exit(1)

            token = response.get("access_token")

            if not token:
                print(
                    "ServiceNow OAuth did not return access_token.",
                    file=sys.stderr,
                )
                print(
                    "Response keys: " + ", ".join(response.keys()),
                    file=sys.stderr,
                )
                sys.exit(1)

            print(token)
            PY
          )"

          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Build enriched ServiceNow approval payload
        shell: bash
        env:
          APPROVER: ${{ github.event.review.user.login }}
          REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail

          python3 <<'PY' > snow-payload.json
          import datetime
          import json
          import os
          from pathlib import Path

          context = json.loads(Path("snow-context.json").read_text())

          now = datetime.datetime.now(
              datetime.timezone.utc
          ).strftime("%Y-%m-%dT%H:%M:%SZ")

          end = (
              datetime.datetime.now(datetime.timezone.utc)
              + datetime.timedelta(hours=1)
          ).strftime("%Y-%m-%dT%H:%M:%SZ")

          repo_full = os.environ.get("GITHUB_REPOSITORY", "")

          owner = repo_full.split("/")[0] if "/" in repo_full else ""
          repo = repo_full.split("/")[1] if "/" in repo_full else repo_full

          server = os.environ.get(
              "GITHUB_SERVER_URL",
              "https://github.com",
          )

          run_id = os.environ.get("GITHUB_RUN_ID", "")
          run_url = f"{server}/{repo_full}/actions/runs/{run_id}"

          approver = os.environ.get("APPROVER", "").strip()
          review_body = os.environ.get("REVIEW_BODY", "").strip()

          if not review_body and approver:
              review_body = f"PR approved in GitHub by {approver}."

          payload = {
              "event_type": "pull_request_ready_for_snow_approval",
              "owner": owner,
              "repo": repo,
              "repo_name": repo_full,
              "pr_number": context["pr_number"],
              "pr_link": context["pr_link"],
              "pr_title": context["pr_title"],
              "source_branch": context["source_branch"],
              "target_branch": context["target_branch"],
              "commit_sha": context["head_sha"],
              "head_sha": context["head_sha"],
              "base_sha": context["base_sha"],
              "pr_author": context["pr_author"],
              "pr_state": context["pr_state"],
              "requested_by": context["requested_by"],
              "requester": context["requested_by"],
              "requestor_github_username": context["requested_by"],
              "requestor_email": "FROM_PR_COMMENT_OR_OKTA_MAPPING",
              "mergeable": context["mergeable"],
              "mergeable_state": context["mergeable_state"],
              "closed_at": context["closed_at"],
              "merged_at": context["merged_at"],
              "approvers": [approver] if approver else [],
              "sme_approval_1": approver,
              "approval_notes": review_body,
              "status": "waiting_for_snow",
              "approval_state": "requested",
              "status_context": "snow-approval",
              "github_check_status": context["github_checks_status"],
              "github_checks_status": context["github_checks_status"],
              "github_checks_detail": json.dumps(
                  context["github_checks_detail"],
                  separators=(",", ":"),
              ),
              "terraform_validate": context["terraform_validate"],
              "checkov_scan_result": context["checkov_scan_result"],
              "codeql_scan_result": context["codeql_scan_result"],
              "gitleaks_scan_result": context["gitleaks_scan_result"],
              "security_scan_result": context["security_scan_result"],
              "terraform_plan_summary": (
                  "Not collected by this PR approval workflow."
              ),
              "pipeline_run_id": run_id,
              "pipeline_url": run_url,
              "artifact_url": run_url,
              "environment": "production",
              "cmdb_ci_name": "TBD",
              "priority": "medium",
              "risk": "medium",
              "impact": "medium",
              "justification": (
                  "Production-bound Terraform module change submitted "
                  "for ServiceNow approval."
              ),
              "implementation_plan": (
                  "Merge to main only after ServiceNow approval sets "
                  "the snow-approval GitHub status to success."
              ),
              "impact_summary": (
                  "Production-bound Terraform change submitted for "
                  "ServiceNow approval."
              ),
              "rollback_plan": (
                  "If rejected, do not merge. If deployed and rollback "
                  "is required, revert the PR or apply the previous "
                  "known-good Terraform version."
              ),
              "deployment_callback_expected": False,
              "planned_start_date": now,
              "planned_end_date": end,
              "triggered_at": now,
          }

          print(json.dumps(payload, indent=2))
          PY

          echo "Custom ServiceNow payload created."

      - name: Send enriched approval payload to ServiceNow
        shell: bash
        env:
          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_API_PATH: ${{ secrets.SN_API_PATH }}
          BEARER: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          for item in SN_INSTANCE_URL SN_API_PATH BEARER
          do
            if [ -z "${!item:-}" ]; then
              echo "Missing required value: ${item}"
              exit 1
            fi
          done

          if [ ! -f snow-payload.json ]; then
            echo "snow-payload.json was not created."
            ls -la
            exit 1
          fi

          if [[ "${SN_API_PATH}" == https://* ]]; then
            URL="${SN_API_PATH}"
          else
            URL="${SN_INSTANCE_URL%/}/${SN_API_PATH#/}"
          fi

          if [[ "${URL}" != https://* ]]; then
            echo "ServiceNow approval endpoint must use HTTPS."
            exit 1
          fi

          echo "Sending approval payload to ServiceNow."

          RESPONSE_FILE="$(mktemp)"
          trap 'rm -f "${RESPONSE_FILE}"' EXIT

          set +e

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              --proto '=https' \
              --tlsv1.2 \
              --connect-timeout 20 \
              --max-time 120 \
              --output "${RESPONSE_FILE}" \
              --write-out "%{http_code}" \
              --request POST \
              --url "${URL}" \
              --header "Authorization: Bearer ${BEARER}" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              --data-binary @snow-payload.json
          )"

          CURL_EXIT=$?

          set -e

          echo "ServiceNow approval POST HTTP status: ${HTTP_STATUS:-no-response}"

          if [ "${CURL_EXIT}" -ne 0 ] && [ "${CURL_EXIT}" -ne 22 ]; then
            echo "Connection to the ServiceNow approval endpoint failed."
            echo "curl exit code: ${CURL_EXIT}"
            exit "${CURL_EXIT}"
          fi

          if [[ ! "${HTTP_STATUS}" =~ ^2[0-9][0-9]$ ]]; then
            echo "ServiceNow did not accept the approval payload."

            python3 - "${RESPONSE_FILE}" <<'PY'
            import json
            import sys
            from pathlib import Path

            raw = Path(sys.argv[1]).read_text(errors="replace")

            try:
                data = json.loads(raw)
                message = (
                    data.get("error")
                    or data.get("message")
                    or data.get("error_description")
                    or "No error message returned."
                )
                print(f"ServiceNow response: {str(message)[:1000]}")
            except Exception:
                print("ServiceNow returned a non-JSON error response.")
            PY

            exit 1
          fi

          echo "ServiceNow accepted the enriched approval payload."
