name: Send Approved PR to SNOW

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  issues: read
  checks: read
  actions: read

env:
  MIN_APPROVALS: 1
  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
  CMDB_CI_NAME: ${{ vars.CMDB_CI_NAME }}

jobs:
  send-approved-pr-to-snow:
    name: send-approved-pr-to-snow
    runs-on: ubuntu-latest

    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main'

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build payload and send to SNOW
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          REPO_FULL: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REQUESTER: ${{ github.event.pull_request.user.login }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          echo "Reading PR comments for engineer email..."
          COMMENTS=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments")

          ENGINEER_EMAIL=$(echo "$COMMENTS" | jq -r '
            [ .[].body
              | select(test("\"snow_metadata\""))
              | fromjson?
              | select(.snow_metadata == true)
              | .engineer_email
            ] | last // empty
          ')

          echo "Engineer email found: ${ENGINEER_EMAIL}"

          echo "Reading PR approvals..."
          REVIEWS=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews")

          APPROVERS=$(echo "$REVIEWS" | jq -c '[.[] | select(.state == "APPROVED") | .user.login] | unique')
          APPROVER_COUNT=$(echo "$APPROVERS" | jq 'length')

          echo "Approver count: ${APPROVER_COUNT}"
          echo "Approvers: ${APPROVERS}"

          if [ "$APPROVER_COUNT" -lt "$MIN_APPROVALS" ]; then
            echo "Need ${MIN_APPROVALS} approval(s) before sending to SNOW."
            exit 0
          fi

          echo "Reading GitHub check runs..."
          CHECK_RUNS=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/commits/${COMMIT_SHA}/check-runs")

          echo "Detected check runs:"
          echo "$CHECK_RUNS" | jq -r '.check_runs[]? | "\(.name) = \(.conclusion)"'

          CHECKOV_STATE=$(echo "$CHECK_RUNS" | jq -r '.check_runs[]? | select((.name | ascii_downcase) == "checkov") | .conclusion' | head -1)
          TF_STATE=$(echo "$CHECK_RUNS" | jq -r '.check_runs[]? | select((.name | ascii_downcase) == "terraform-checks") | .conclusion' | head -1)
          GITLEAKS_STATE=$(echo "$CHECK_RUNS" | jq -r '.check_runs[]? | select((.name | ascii_downcase) == "gitleaks") | .conclusion' | head -1)

          # CodeQL may show as "CodeQL", "codeql", or "codeql (javascript-typescript)"
          CODEQL_STATE=$(echo "$CHECK_RUNS" | jq -r '.check_runs[]? | select((.name | ascii_downcase) | contains("codeql")) | .conclusion' | head -1)

          CHECKOV_RESULT=$([ "$CHECKOV_STATE" = "success" ] && echo "PASSED" || echo "FAILED_OR_PENDING")
          TF_RESULT=$([ "$TF_STATE" = "success" ] && echo "PASSED" || echo "FAILED_OR_PENDING")
          CODEQL_RESULT=$([ "$CODEQL_STATE" = "success" ] && echo "PASSED" || echo "FAILED_OR_PENDING")
          GITLEAKS_RESULT=$([ "$GITLEAKS_STATE" = "success" ] && echo "PASSED" || echo "FAILED_OR_PENDING")

          echo "checkov=$CHECKOV_RESULT"
          echo "terraform=$TF_RESULT"
          echo "codeql=$CODEQL_RESULT"
          echo "gitleaks=$GITLEAKS_RESULT"

          if [ "$CHECKOV_RESULT" != "PASSED" ] || [ "$TF_RESULT" != "PASSED" ] || [ "$CODEQL_RESULT" != "PASSED" ] || [ "$GITLEAKS_RESULT" != "PASSED" ]; then
            echo "Not all required checks passed. SNOW payload will not be sent."
            exit 0
          fi

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg event_type "pull_request_ready_for_snow_approval" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --arg repo_name "$REPO_FULL" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_link "$PR_URL" \
            --arg pr_title "$PR_TITLE" \
            --arg source_branch "$SOURCE_BRANCH" \
            --arg target_branch "$TARGET_BRANCH" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg requester "$REQUESTER" \
            --arg engineer_email "$ENGINEER_EMAIL" \
            --arg status_context "snow-approval" \
            --arg github_check_status "success" \
            --arg terraform_validate "$TF_RESULT" \
            --arg checkov_scan_result "$CHECKOV_RESULT" \
            --arg codeql_scan_result "$CODEQL_RESULT" \
            --arg gitleaks_scan_result "$GITLEAKS_RESULT" \
            --arg pipeline_run_id "$RUN_ID" \
            --arg pipeline_url "${SERVER_URL}/${REPO_FULL}/actions/runs/${RUN_ID}" \
            --arg environment "production" \
            --arg cmdb_ci_name "$CMDB_CI_NAME" \
            --arg impact_summary "Production-bound Terraform module change submitted for CCoE approval in ServiceNow." \
            --arg rollback_plan "If rejected, do not merge. If deployed and rollback is required, revert the PR or apply the previous known-good Terraform module version." \
            --argjson approvers "$APPROVERS" \
            '{
              shared_secret: $shared_secret,
              event_type: $event_type,
              owner: $owner,
              repo: $repo,
              repo_name: $repo_name,
              pr_number: ($pr_number | tonumber),
              pr_link: $pr_link,
              pr_title: $pr_title,
              source_branch: $source_branch,
              target_branch: $target_branch,
              commit_sha: $commit_sha,
              requester: $requester,
              requestor_github_username: $requester,
              requestor_email: $engineer_email,
              approvers: $approvers,
              status: "waiting_for_snow",
              approval_state: "requested",
              status_context: $status_context,
              github_check_status: $github_check_status,
              terraform_validate: $terraform_validate,
              checkov_scan_result: $checkov_scan_result,
              codeql_scan_result: $codeql_scan_result,
              gitleaks_scan_result: $gitleaks_scan_result,
              pipeline_run_id: $pipeline_run_id,
              pipeline_url: $pipeline_url,
              environment: $environment,
              cmdb_ci_name: $cmdb_ci_name,
              impact_summary: $impact_summary,
              rollback_plan: $rollback_plan
            } | with_entries(select(.value != null and .value != "" and .value != []))' > snow_pr_payload.json

          echo "Payload preview without secret:"
          jq '.shared_secret="****"' snow_pr_payload.json

          echo "Sending payload to SNOW..."
          curl --fail-with-body -sS \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/webhook" \
            --data @snow_pr_payload.json
