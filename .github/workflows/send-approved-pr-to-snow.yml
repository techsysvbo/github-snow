name: Send Approved PR to ServiceNow

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  send-to-snow:
    name: Send approved PR to ServiceNow

    # Run only when a PR targeting main receives an approval.
    if: >-
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'

    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Configure trusted CA bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No trusted CA bundle found on the runner."
            exit 1
          fi

          {
            echo "SSL_CERT_FILE=${CA_BUNDLE}"
            echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}"
            echo "CURL_CA_BUNDLE=${CA_BUNDLE}"
            echo "GIT_SSL_CAINFO=${CA_BUNDLE}"
            echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}"
          } >> "$GITHUB_ENV"

      - name: Collect PR data and validate required checks
        id: pr_data
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            > pr.json

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            > check-runs.json

          python3 <<'PY' > outputs.txt
          import json
          import sys
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          checks = json.loads(
              Path("check-runs.json").read_text()
          ).get("check_runs", [])

          REQUIRED = {
              "checkov": ["checkov"],
              "codeql": ["codeql"],
              "gitleaks": ["gitleaks"],
              "terraform_checks_dev": ["terraform-checks (dev)"],
              "terraform_checks_prod": ["terraform-checks (prod)"],
          }

          def norm(value):
              return (value or "").strip().lower()

          def run_result(run):
              conclusion = norm(run.get("conclusion"))
              status = norm(run.get("status"))

              if conclusion == "success":
                  return "PASSED"

              if conclusion in {
                  "failure",
                  "cancelled",
                  "timed_out",
                  "action_required",
                  "startup_failure",
              }:
                  return "FAILED"

              if conclusion in {"skipped", "neutral"}:
                  return "SKIPPED"

              if status in {
                  "queued",
                  "in_progress",
                  "waiting",
                  "requested",
                  "pending",
              }:
                  return "PENDING"

              return "MISSING"

          def check_result(aliases):
              aliases = [norm(alias) for alias in aliases]
              matches = []

              for run in checks:
                  name = norm(run.get("name"))

                  if any(
                      name == alias or alias in name
                      for alias in aliases
                  ):
                      matches.append(run)

              if not matches:
                  return "MISSING"

              results = [run_result(item) for item in matches]

              if "FAILED" in results:
                  return "FAILED"

              if "PENDING" in results or "MISSING" in results:
                  return "PENDING"

              if all(result in {"PASSED", "SKIPPED"} for result in results):
                  return "PASSED"

              return "PENDING"

          results = {
              key: check_result(aliases)
              for key, aliases in REQUIRED.items()
          }

          required_values = list(results.values())

          if all(value == "PASSED" for value in required_values):
              overall = "success"
          elif "FAILED" in required_values:
              overall = "failure"
          else:
              overall = "pending"

          print(f"Checkov: {results['checkov']}", file=sys.stderr)
          print(f"CodeQL: {results['codeql']}", file=sys.stderr)
          print(f"Gitleaks: {results['gitleaks']}", file=sys.stderr)
          print(
              f"Terraform dev: {results['terraform_checks_dev']}",
              file=sys.stderr,
          )
          print(
              f"Terraform prod: {results['terraform_checks_prod']}",
              file=sys.stderr,
          )

          if overall != "success":
              print(
                  "Required checks are not all successful.",
                  file=sys.stderr,
              )
              sys.exit(1)

          details = {
              **results,
              "check_runs": [
                  {
                      "name": run.get("name", ""),
                      "status": run.get("status", ""),
                      "conclusion": run.get("conclusion", ""),
                      "html_url": run.get("html_url", ""),
                  }
                  for run in checks
              ],
          }

          outputs = {
              "pr_number": str(pr.get("number", "")),
              "pr_url": pr.get("html_url", ""),
              "pr_title": pr.get("title", ""),
              "source_branch": pr.get("head", {}).get("ref", ""),
              "target_branch": pr.get("base", {}).get("ref", ""),
              "head_sha": pr.get("head", {}).get("sha", ""),
              "base_sha": pr.get("base", {}).get("sha", ""),
              "pr_author": pr.get("user", {}).get("login", ""),
              "pr_state": pr.get("state", ""),
              "requester": pr.get("user", {}).get("login", ""),
              "mergeable": (
                  ""
                  if pr.get("mergeable") is None
                  else str(pr.get("mergeable")).lower()
              ),
              "mergeable_state": pr.get("mergeable_state", ""),
              "github_checks_status": overall,
              "checkov_result": results["checkov"],
              "codeql_result": results["codeql"],
              "gitleaks_result": results["gitleaks"],
              "terraform_dev_result": results["terraform_checks_dev"],
              "terraform_prod_result": results["terraform_checks_prod"],
              "github_checks_detail": json.dumps(
                  details,
                  separators=(",", ":"),
              ),
          }

          for key, value in outputs.items():
              print(f"{key}<<EOF")
              print(value)
              print("EOF")
          PY

          cat outputs.txt >> "$GITHUB_OUTPUT"

      - name: Get ServiceNow OAuth access token
        id: token
        shell: bash
        env:
          SN_OAUTH_TOKEN_URL: ${{ secrets.SN_OAUTH_TOKEN_URL }}
          SN_OAUTH_CLIENT_ID: ${{ secrets.SN_OAUTH_CLIENT_ID }}
          SN_OAUTH_CLIENT_SECRET: ${{ secrets.SN_OAUTH_CLIENT_SECRET }}
          SN_OAUTH_USERNAME: ${{ secrets.SN_OAUTH_USERNAME }}
          SN_OAUTH_PASSWORD: ${{ secrets.SN_OAUTH_PASSWORD }}
        run: |
          set -euo pipefail

          for item in \
            SN_OAUTH_TOKEN_URL \
            SN_OAUTH_CLIENT_ID \
            SN_OAUTH_CLIENT_SECRET \
            SN_OAUTH_USERNAME \
            SN_OAUTH_PASSWORD
          do
            if [ -z "${!item:-}" ]; then
              echo "Missing required GitHub secret: ${item}"
              exit 1
            fi
          done

          SN_OAUTH_TOKEN_URL="$(
            printf '%s' "${SN_OAUTH_TOKEN_URL}" | tr -d '\r\n'
          )"

          SN_OAUTH_CLIENT_ID="$(
            printf '%s' "${SN_OAUTH_CLIENT_ID}" | tr -d '\r\n'
          )"

          SN_OAUTH_CLIENT_SECRET="$(
            printf '%s' "${SN_OAUTH_CLIENT_SECRET}" | tr -d '\r\n'
          )"

          SN_OAUTH_USERNAME="$(
            printf '%s' "${SN_OAUTH_USERNAME}" | tr -d '\r\n'
          )"

          SN_OAUTH_PASSWORD="$(
            printf '%s' "${SN_OAUTH_PASSWORD}" | tr -d '\r\n'
          )"

          if [[ "${SN_OAUTH_TOKEN_URL}" != https://* ]]; then
            echo "SN_OAUTH_TOKEN_URL must use HTTPS."
            exit 1
          fi

          echo "Requesting ServiceNow OAuth token."

          TOKEN_FILE="$(mktemp)"
          trap 'rm -f "${TOKEN_FILE}"' EXIT

          set +e

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              --proto '=https' \
              --tlsv1.2 \
              --connect-timeout 20 \
              --max-time 90 \
              --output "${TOKEN_FILE}" \
              --write-out "%{http_code}" \
              --request POST \
              --url "${SN_OAUTH_TOKEN_URL}" \
              --header "Content-Type: application/x-www-form-urlencoded" \
              --header "Accept: application/json" \
              --data-urlencode "grant_type=client_credentials" \
              --data-urlencode "client_id=${SN_OAUTH_CLIENT_ID}" \
              --data-urlencode "client_secret=${SN_OAUTH_CLIENT_SECRET}" \
              --data-urlencode "username=${SN_OAUTH_USERNAME}" \
              --data-urlencode "password=${SN_OAUTH_PASSWORD}"
          )"

          CURL_EXIT=$?

          set -e

          echo "ServiceNow OAuth HTTP status: ${HTTP_STATUS:-no-response}"

          if [ "${CURL_EXIT}" -ne 0 ] && [ "${CURL_EXIT}" -ne 22 ]; then
            echo "OAuth connection failed before ServiceNow returned a response."
            echo "curl exit code: ${CURL_EXIT}"
            exit "${CURL_EXIT}"
          fi

          if [[ ! "${HTTP_STATUS}" =~ ^2[0-9][0-9]$ ]]; then
            echo "ServiceNow rejected the OAuth request."
            echo "ServiceNow response:"

            tr -d '\r' < "${TOKEN_FILE}" | head -c 1500 || true

            echo
            exit 1
          fi

          ACCESS_TOKEN="$(
            python3 - "${TOKEN_FILE}" <<'PY'
            import json
            import sys
            from pathlib import Path

            response = json.loads(Path(sys.argv[1]).read_text())
            token = response.get("access_token")

            if not token:
                print(
                    "ServiceNow OAuth did not return access_token. "
                    "Response keys: " + ", ".join(response.keys()),
                    file=sys.stderr,
                )
                sys.exit(1)

            print(token)
            PY
          )"

          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Build ServiceNow approval payload
        shell: bash
        env:
          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
          PR_URL: ${{ steps.pr_data.outputs.pr_url }}
          PR_TITLE: ${{ steps.pr_data.outputs.pr_title }}
          SOURCE_BRANCH: ${{ steps.pr_data.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.pr_data.outputs.target_branch }}
          HEAD_SHA: ${{ steps.pr_data.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr_data.outputs.base_sha }}
          PR_AUTHOR: ${{ steps.pr_data.outputs.pr_author }}
          PR_STATE: ${{ steps.pr_data.outputs.pr_state }}
          REQUESTER: ${{ steps.pr_data.outputs.requester }}
          MERGEABLE: ${{ steps.pr_data.outputs.mergeable }}
          MERGEABLE_STATE: ${{ steps.pr_data.outputs.mergeable_state }}
          APPROVER: ${{ github.event.review.user.login }}
          APPROVAL_NOTES: ${{ github.event.review.body }}
          GITHUB_CHECKS_STATUS: ${{ steps.pr_data.outputs.github_checks_status }}
          GITHUB_CHECKS_DETAIL: ${{ steps.pr_data.outputs.github_checks_detail }}
          CHECKOV_RESULT: ${{ steps.pr_data.outputs.checkov_result }}
          CODEQL_RESULT: ${{ steps.pr_data.outputs.codeql_result }}
          GITLEAKS_RESULT: ${{ steps.pr_data.outputs.gitleaks_result }}
          TERRAFORM_DEV_RESULT: ${{ steps.pr_data.outputs.terraform_dev_result }}
          TERRAFORM_PROD_RESULT: ${{ steps.pr_data.outputs.terraform_prod_result }}
        run: |
          set -euo pipefail

          python3 <<'PY' > snow-payload.json
          import datetime
          import json
          import os

          get = os.environ.get

          now = datetime.datetime.now(datetime.timezone.utc)
          planned_end = now + datetime.timedelta(hours=1)

          repo_full = get("GITHUB_REPOSITORY", "")
          owner, _, repo = repo_full.partition("/")

          server = get("GITHUB_SERVER_URL", "https://github.com")
          run_id = get("GITHUB_RUN_ID", "")
          run_url = f"{server}/{repo_full}/actions/runs/{run_id}"

          approver = get("APPROVER", "").strip()
          notes = get("APPROVAL_NOTES", "").strip()

          if not notes and approver:
              notes = f"PR approved in GitHub by {approver}."

          payload = {
              "event_type": "pull_request_ready_for_snow_approval",
              "owner": owner,
              "repo": repo,
              "repo_name": repo_full,
              "pr_number": int(get("PR_NUMBER", "0") or 0),
              "pr_link": get("PR_URL", ""),
              "pr_title": get("PR_TITLE", ""),
              "source_branch": get("SOURCE_BRANCH", ""),
              "target_branch": get("TARGET_BRANCH", ""),
              "commit_sha": get("HEAD_SHA", ""),
              "head_sha": get("HEAD_SHA", ""),
              "base_sha": get("BASE_SHA", ""),
              "pr_author": get("PR_AUTHOR", ""),
              "pr_state": get("PR_STATE", ""),
              "requested_by": get("REQUESTER", ""),
              "requester": get("REQUESTER", ""),
              "requestor_github_username": get("REQUESTER", ""),
              "requestor_email": "FROM_PR_COMMENT_OR_OKTA_MAPPING",
              "mergeable": get("MERGEABLE", ""),
              "mergeable_state": get("MERGEABLE_STATE", ""),
              "approvers": [approver] if approver else [],
              "sme_approval_1": approver,
              "approval_notes": notes,
              "status": "waiting_for_snow",
              "approval_state": "requested",
              "status_context": "snow-approval",
              "github_check_status": get("GITHUB_CHECKS_STATUS", ""),
              "github_checks_status": get("GITHUB_CHECKS_STATUS", ""),
              "github_checks_detail": get("GITHUB_CHECKS_DETAIL", ""),
              "terraform_validate": "PASSED",
              "checkov_scan_result": get("CHECKOV_RESULT", ""),
              "codeql_scan_result": get("CODEQL_RESULT", ""),
              "gitleaks_scan_result": get("GITLEAKS_RESULT", ""),
              "terraform_dev_result": get("TERRAFORM_DEV_RESULT", ""),
              "terraform_prod_result": get("TERRAFORM_PROD_RESULT", ""),
              "security_scan_result": "PASSED",
              "terraform_plan_summary": (
                  "Not collected by the PR approval workflow."
              ),
              "pipeline_run_id": run_id,
              "pipeline_url": run_url,
              "artifact_url": run_url,
              "environment": "production",
              "cmdb_ci_name": "TBD",
              "priority": "medium",
              "risk": "medium",
              "impact": "medium",
              "justification": (
                  "Production-bound Terraform module change submitted "
                  "for ServiceNow approval."
              ),
              "implementation_plan": (
                  "Merge to main only after ServiceNow approval "
                  "sets snow-approval to success."
              ),
              "impact_summary": (
                  "Production-bound Terraform module change submitted "
                  "for ServiceNow approval."
              ),
              "rollback_plan": (
                  "If rejected, do not merge. If deployed and rollback "
                  "is required, revert the PR or apply the previous "
                  "known-good Terraform version."
              ),
              "planned_start_date": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "planned_end_date": planned_end.strftime(
                  "%Y-%m-%dT%H:%M:%SZ"
              ),
              "triggered_at": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
          }

          print(json.dumps(payload, indent=2))
          PY

          python3 -c '
          import json

          payload = json.load(
              open("snow-payload.json", encoding="utf-8")
          )

          print(
              json.dumps(
                  {
                      "event_type": payload["event_type"],
                      "pr_number": payload["pr_number"],
                      "github_checks_status": (
                          payload["github_checks_status"]
                      ),
                      "cmdb_ci_name": payload["cmdb_ci_name"],
                  },
                  indent=2,
              )
          )
          '

      - name: Send approval payload to ServiceNow
        shell: bash
        env:
          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_API_PATH: ${{ secrets.SN_API_PATH }}
          ACCESS_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail

          for item in SN_INSTANCE_URL SN_API_PATH ACCESS_TOKEN
          do
            if [ -z "${!item:-}" ]; then
              echo "Missing required value: ${item}"
              exit 1
            fi
          done

          SN_INSTANCE_URL="$(
            printf '%s' "${SN_INSTANCE_URL}" | tr -d '\r\n'
          )"

          SN_API_PATH="$(
            printf '%s' "${SN_API_PATH}" | tr -d '\r\n'
          )"

          if [[ "${SN_API_PATH}" == https://* ]]; then
            URL="${SN_API_PATH}"
          else
            URL="${SN_INSTANCE_URL%/}/${SN_API_PATH#/}"
          fi

          if [[ "${URL}" != https://* ]]; then
            echo "ServiceNow approval endpoint must use HTTPS."
            exit 1
          fi

          RESPONSE_FILE="$(mktemp)"
          trap 'rm -f "${RESPONSE_FILE}"' EXIT

          echo "Sending approval payload to ServiceNow."

          set +e

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --fail-with-body \
              --proto '=https' \
              --tlsv1.2 \
              --connect-timeout 20 \
              --max-time 120 \
              --output "${RESPONSE_FILE}" \
              --write-out "%{http_code}" \
              --request POST \
              --url "${URL}" \
              --header "Authorization: Bearer ${ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              --data-binary @snow-payload.json
          )"

          CURL_EXIT=$?

          set -e

          echo "ServiceNow approval POST HTTP status: ${HTTP_STATUS:-no-response}"

          if [ "${CURL_EXIT}" -ne 0 ] && [ "${CURL_EXIT}" -ne 22 ]; then
            echo "Connection to the ServiceNow approval endpoint failed."
            echo "curl exit code: ${CURL_EXIT}"
            exit "${CURL_EXIT}"
          fi

          if [[ ! "${HTTP_STATUS}" =~ ^2[0-9][0-9]$ ]]; then
            echo "ServiceNow did not accept the approval payload."
            echo "ServiceNow response:"

            tr -d '\r' < "${RESPONSE_FILE}" | head -c 1500 || true

            echo
            exit 1
          fi

          echo "ServiceNow accepted the approval payload."
