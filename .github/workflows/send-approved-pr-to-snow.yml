# 7-year-old explanation:
# When a reviewer approves the PR, GitHub checks the Terraform code again.
# If the code is safe, GitHub sends the PR to ServiceNow.
# If the code is not safe, GitHub does not bother ServiceNow.

# Expert explanation:
# This workflow no longer depends on finding a separate terraform-checks check run.
# It performs its own fmt/init/validate/Checkov gate before creating snow-approval=pending
# and posting the approval payload to ServiceNow /webhook.

name: Send Approved PR to SNOW Webhook

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: read
  statuses: write
  security-events: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_API_PATH: ${{ secrets.SN_API_PATH }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

jobs:
  send-to-snow-webhook:
    name: send-to-snow-webhook
    runs-on: ubuntu-latest

    if: github.event.review.state == 'approved' && github.event.pull_request.base.ref == 'main'

    steps:
      - name: Checkout repository code
        # 7-year-old: GitHub downloads the PR code.
        # Expert: Checkout PR head SHA, not main.
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Terraform
        # 7-year-old: GitHub installs Terraform.
        # Expert: Required before fmt/init/validate.
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        # 7-year-old: Checks if Terraform is neat.
        # Expert: Blocks SNOW request if HCL formatting is wrong.
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        # 7-year-old: Gets Terraform ready.
        # Expert: Initializes providers for validation and scanning.
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        # 7-year-old: Checks if Terraform makes sense.
        # Expert: Blocks SNOW request if Terraform is invalid.
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan
        # 7-year-old: Checks if the AWS code is safe.
        # Expert: Blocks SNOW request if IaC security scan fails.
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Set SNOW approval status to pending
        # 7-year-old: GitHub puts up a stop sign saying “waiting for SNOW.”
        # Expert: Required branch protection context.
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: pr.head.sha,
              state: "pending",
              context: "snow-approval",
              description: "Waiting for ServiceNow approval",
              target_url: pr.html_url
            });

      - name: Send PR payload to ServiceNow webhook
        # 7-year-old: GitHub sends the PR details to ServiceNow.
        # Expert: Posts approved PR metadata to SNOW /webhook.
        run: |
          FULL_SN_URL="${SN_INSTANCE_URL}${SN_API_PATH}"

          curl -sS -X POST "$FULL_SN_URL" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"event_type\": \"pull_request_review_approved\",
              \"owner\": \"${{ github.repository_owner }}\",
              \"repo\": \"${{ github.event.repository.name }}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"pr_number\": \"${{ github.event.pull_request.number }}\",
              \"pr_url\": \"${{ github.event.pull_request.html_url }}\",
              \"pr_link\": \"${{ github.event.pull_request.html_url }}\",
              \"pr_title\": \"${{ github.event.pull_request.title }}\",
              \"source_branch\": \"${{ github.event.pull_request.head.ref }}\",
              \"target_branch\": \"${{ github.event.pull_request.base.ref }}\",
              \"commit_sha\": \"${{ github.event.pull_request.head.sha }}\",
              \"requester\": \"${{ github.event.pull_request.user.login }}\",
              \"requestor_github_username\": \"${{ github.event.pull_request.user.login }}\",
              \"approvers\": [\"${{ github.event.review.user.login }}\"],
              \"sme_approval_1\": \"${{ github.event.review.user.login }}\",
              \"status\": \"waiting_for_snow\",
              \"approval_state\": \"requested\",
              \"status_context\": \"snow-approval\",
              \"github_check_status\": \"success\",
              \"github_checks_status\": \"PASSED\",
              \"terraform_fmt\": \"PASSED\",
              \"terraform_validate\": \"PASSED\",
              \"checkov_scan_result\": \"PASSED\",
              \"security_scan_result\": \"PASSED\",
              \"pipeline_run_id\": \"${{ github.run_id }}\",
              \"pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"environment\": \"lab\",
              \"impact_summary\": \"Lab Terraform change submitted for ServiceNow approval.\",
              \"rollback_plan\": \"Revert PR or run Terraform rollback plan if needed.\"
            }"
