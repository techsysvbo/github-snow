name: checkov

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkov:
    name: checkov
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect CA bundle path
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No known CA bundle found."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Install Checkov without Docker
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "checkov==3.3.1"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Checkov IaC scan
        shell: bash
        run: |
          set -euo pipefail

          checkov \
            --directory terraform \
            --framework terraform \
            --quiet
