name: checkov

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  checkov:
    name: checkov
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure CA bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No trusted CA bundle found on the runner."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Install Checkov
        shell: bash
        run: |
          set -euo pipefail

          CHECKOV_VENV="${RUNNER_TEMP}/checkov-venv"

          rm -rf "${CHECKOV_VENV}"
          python3 -m venv "${CHECKOV_VENV}"

          "${CHECKOV_VENV}/bin/python" -m pip install --upgrade pip
          "${CHECKOV_VENV}/bin/python" -m pip install "checkov==3.3.1"

          echo "CHECKOV_BIN=${CHECKOV_VENV}/bin/checkov" >> "$GITHUB_ENV"

      - name: Run Checkov IaC scan
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/checkov-results"

          set +e
          "${CHECKOV_BIN}" \
            --directory terraform \
            --framework terraform \
            -o cli \
            -o json \
            --output-file-path console,"${GITHUB_WORKSPACE}/checkov-results/checkov.json" \
            --soft-fail
          CHECKOV_EXIT_CODE=$?
          set -e

          echo "Checkov report location on runner:"
          echo "${GITHUB_WORKSPACE}/checkov-results/checkov.json"

          echo "Files created:"
          ls -la "${GITHUB_WORKSPACE}/checkov-results"

          exit 0

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: checkov-results/
          retention-days: 3
          if-no-files-found: error