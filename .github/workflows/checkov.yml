name: checkov

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - "feature/**"
      - "feature-*"
      - "fix/**"
      - "bugfix/**"
      - "hotfix/**"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  checkov:
    name: checkov
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false
