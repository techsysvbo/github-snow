name: Checkov IaC Scan

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "terraform-modules/**"
      - "common-tags/**"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  checkov:
    name: checkov
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          soft_fail: false
          quiet: true
          output_format: cli,sarif,json
          output_file_path: console,results.sarif,checkov-results.json

      - name: Upload Checkov SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload Checkov JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json
