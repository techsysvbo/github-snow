# 7yo: Looks at the Terraform and asks "did you forget any locks?"
# SME: Checkov IaC static analysis for AWS misconfigs; SARIF to Security tab.
name: checkov
on:
  pull_request:
    branches: [ main ]
    paths: [ "terraform/**" ]
permissions:
  contents: read
  security-events: write
jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
