name: Terraform PR Checks

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - "terraform-modules/**"
      - "common-tags/**"
      - ".github/workflows/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  workflow-yaml-check:
    name: workflow-yaml-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate GitHub Actions YAML
        uses: raven-actions/actionlint@v2

  terraform-checks:
    name: terraform-checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - terraform/environments/dev/s3
          - terraform/environments/dev/ec2

    defaults:
      run:
        working-directory: ${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
