# 7yo: This checks the whole dev room and the whole prod room.
# SME: Environment-level Terraform validation. Modules are reusable building blocks;
# branch protection should require environment root stack checks, not every module.

name: terraform-checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
  terraform-checks:
    name: terraform-checks (${{ matrix.environment.name }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment:
          - name: dev
            path: terraform/environments/dev
          - name: prod
            path: terraform/environments/prod

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.environment.path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate
