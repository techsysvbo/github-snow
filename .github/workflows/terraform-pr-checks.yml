# 7yo: Checks the Terraform is spelled right in every room before anyone says yes.
# SME: Matrix fmt/init/validate. init uses -backend=false so PR checks need NO creds.
name: terraform-checks
on:
  pull_request:
    branches: [ main ]
    paths: [ "terraform/**" ]
permissions:
  contents: read
jobs:
  terraform-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path:
          - terraform/environments/dev/s3
          - terraform/environments/dev/ec2
          - terraform/environments/prod/s3
          - terraform/environments/prod/ec2
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - name: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.path }}
      - name: init (no backend, no creds needed on PR)
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.path }}
      - name: validate
        run: terraform validate
        working-directory: ${{ matrix.path }}
