name: Send Approved PR to SNOW

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  send:
    if: >
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Send PR payload to ServiceNow
        env:
          GH_TOKEN: ${{ github.token }}

          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_API_USER: ${{ secrets.SN_API_USER }}
          SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REQUESTER: ${{ github.event.pull_request.user.login }}
          PIPELINE_RUN_ID: ${{ github.run_id }}
          PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          echo "Fetching PR reviews from GitHub..."

          REVIEWS_JSON=$(curl --silent --show-error --fail-with-body \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls/${PR_NUMBER}/reviews")

          APPROVERS=$(echo "$REVIEWS_JSON" | jq '[.[] | select(.state == "APPROVED") | .user.login] | unique')
          APPROVER_COUNT=$(echo "$APPROVERS" | jq 'length')

          echo "Approver count: ${APPROVER_COUNT}"
          echo "Approvers: ${APPROVERS}"

          if [ "$APPROVER_COUNT" -lt 1 ]; then
            echo "No approval found. Exiting."
            exit 0
          fi

          echo "Building ServiceNow payload..."

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg owner "$OWNER" \
            --arg repo "$REPO" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg pr_title "$PR_TITLE" \
            --arg source_branch "$SOURCE_BRANCH" \
            --arg target_branch "$TARGET_BRANCH" \
            --arg sha "$SHA" \
            --arg requester "$REQUESTER" \
            --arg pipeline_run_id "$PIPELINE_RUN_ID" \
            --arg pipeline_url "$PIPELINE_URL" \
            --arg github_checks_status "success" \
            --arg checkov_scan_result "pending" \
            --arg security_scan_result "pending" \
            --arg environment "production" \
            --arg impact_summary "Production-bound Terraform change submitted for ServiceNow approval." \
            --arg rollback_plan "Revert PR or run Terraform rollback plan if needed." \
            --argjson approvers "$APPROVERS" \
            '{
              data: {
                shared_secret: $shared_secret,
                owner: $owner,
                repo: $repo,
                pr_number: $pr_number,
                pr_url: $pr_url,
                pr_title: $pr_title,
                source_branch: $source_branch,
                target_branch: $target_branch,
                sha: $sha,
                requester: $requester,
                approvers: $approvers,
                status_context: "snow-approval",
                github_checks_status: $github_checks_status,
                checkov_scan_result: $checkov_scan_result,
                security_scan_result: $security_scan_result,
                pipeline_run_id: $pipeline_run_id,
                pipeline_url: $pipeline_url,
                environment: $environment,
                impact_summary: $impact_summary,
                rollback_plan: $rollback_plan
              }
            }' > payload.json

          echo "Payload preview:"
          jq '.data.shared_secret="****"' payload.json

          echo "Sending payload to ServiceNow /submit endpoint..."

          HTTP_CODE=$(curl --silent --show-error -o response.json -w "%{http_code}" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -X POST \
            "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/submit" \
            --data @payload.json)

          echo "ServiceNow HTTP status: ${HTTP_CODE}"
          cat response.json | jq '.'

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Failed to send payload to ServiceNow."
            exit 1
          fi

          echo "PR successfully sent to ServiceNow for approval."
