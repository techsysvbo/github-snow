name: 01 PR Security Gates

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  security-events: write
  statuses: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  terraform-validate:
    name: terraform-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform

      - name: Validate production S3 stack
        working-directory: terraform/environments/prod/s3
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate production EC2 stack
        working-directory: terraform/environments/prod/ec2
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Reset SNOW gates when PR changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;

            const statuses = [
              ["snow-approval", "Waiting for ServiceNow approval"],
              ["snow-deployment-gate", "Waiting for ServiceNow pre-merge deployment gate"]
            ];

            for (const [contextName, description] of statuses) {
              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: pr.head.sha,
                state: "pending",
                context: contextName,
                description,
                target_url: pr.html_url
              });
            }

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Checkov IaC security gate
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full repository history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: codeql
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check whether JavaScript or TypeScript exists
        id: js_check
        shell: bash
        run: |
          if find . -type f \( -name "*.js" -o -name "*.ts" \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" | grep -q .; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.js_check.outputs.has_js == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Run CodeQL analysis
        if: steps.js_check.outputs.has_js == 'true'
        uses: github/codeql-action/analyze@v4

      - name: CodeQL intentionally skipped
        if: steps.js_check.outputs.has_js == 'false'
        run: echo "No JavaScript or TypeScript found. CodeQL intentionally skipped."
