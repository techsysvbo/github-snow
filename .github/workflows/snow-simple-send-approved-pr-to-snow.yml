name: snow-simple-send-approved-pr-to-snow

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  send-static-pass-payload-to-snow:
    name: send-static-pass-payload-to-snow

    if: >-
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'

    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect CA bundle path
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No known CA bundle found."
            exit 1
          fi

          echo "Using CA bundle: ${CA_BUNDLE}"

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Validate required tools
        shell: bash
        run: |
          set -euo pipefail

          for cmd in curl gh python3; do
            if ! command -v "${cmd}" >/dev/null 2>&1; then
              echo "Missing required command on self-hosted runner: ${cmd}"
              exit 1
            fi
          done

          curl --version
          gh --version
          python3 --version

      - name: Create temporary static pass statuses
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          CONTEXTS=(
            "checkov"
            "codeql"
            "gitleaks"
            "terraform-checks (dev)"
            "terraform-checks (prod)"
          )

          for CONTEXT in "${CONTEXTS[@]}"; do
            echo "Setting temporary static pass status for: ${CONTEXT}"

            gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
              -f state="success" \
              -f context="${CONTEXT}" \
              -f description="Temporary static pass for SNOW team E2E test" \
              -f target_url="${RUN_URL}"
          done

          echo "Temporary static pass statuses created."

      - name: Fetch PR metadata and SME approval details
        id: pr_data
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" > pr.json

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" > reviews.json

          python3 <<'PY' > pr-outputs.txt
          import json
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          reviews = json.loads(Path("reviews.json").read_text())

          latest_by_user = {}

          for review in reviews:
              user = (review.get("user") or {}).get("login", "")
              if user:
                  latest_by_user[user] = review

          approved_users = [
              user
              for user, review in latest_by_user.items()
              if str(review.get("state", "")).upper() == "APPROVED"
          ]

          latest_approved_review = None

          for review in reversed(reviews):
              if str(review.get("state", "")).upper() == "APPROVED":
                  latest_approved_review = review
                  break

          latest_approver = ""
          approval_notes = ""

          if latest_approved_review:
              latest_approver = (latest_approved_review.get("user") or {}).get("login", "")
              approval_notes = latest_approved_review.get("body") or ""

          if not approval_notes and latest_approver:
              approval_notes = f"PR approved in GitHub by {latest_approver}."

          outputs = {
              "pr_number": str(pr.get("number", "")),
              "pr_link": pr.get("html_url", ""),
              "pr_title": pr.get("title", ""),
              "source_branch": pr.get("head", {}).get("ref", ""),
              "target_branch": pr.get("base", {}).get("ref", ""),
              "head_sha": pr.get("head", {}).get("sha", ""),
              "base_sha": pr.get("base", {}).get("sha", ""),
              "pr_author": pr.get("user", {}).get("login", ""),
              "pr_state": pr.get("state", ""),
              "requested_by": pr.get("user", {}).get("login", ""),
              "mergeable": "" if pr.get("mergeable") is None else str(pr.get("mergeable")).lower(),
              "mergeable_state": pr.get("mergeable_state", ""),
              "closed_at": pr.get("closed_at") or "",
              "merged_at": pr.get("merged_at") or "",
              "latest_approver": latest_approver,
              "approved_users_json": json.dumps(approved_users),
              "approval_notes": approval_notes,
          }

          for key, value in outputs.items():
              print(f"{key}<<EOF")
              print("" if value is None else str(value))
              print("EOF")
          PY

          cat pr-outputs.txt >> "$GITHUB_OUTPUT"

      - name: Get ServiceNow OAuth token
        id: token
        shell: bash
        env:
          SN_OAUTH_TOKEN_URL: ${{ secrets.SN_OAUTH_TOKEN_URL }}
          SN_OAUTH_CLIENT_ID: ${{ secrets.SN_OAUTH_CLIENT_ID }}
          SN_OAUTH_CLIENT_SECRET: ${{ secrets.SN_OAUTH_CLIENT_SECRET }}
          SN_OAUTH_USERNAME: ${{ secrets.SN_OAUTH_USERNAME }}
          SN_OAUTH_PASSWORD: ${{ secrets.SN_OAUTH_PASSWORD }}
        run: |
          set -euo pipefail

          for item in SN_OAUTH_TOKEN_URL SN_OAUTH_CLIENT_ID SN_OAUTH_CLIENT_SECRET SN_OAUTH_USERNAME SN_OAUTH_PASSWORD; do
            if [ -z "${!item:-}" ]; then
              echo "Missing required GitHub secret: ${item}"
              exit 1
            fi
          done

          TOKEN_RESPONSE="$(curl --fail-with-body -sS -X POST "${SN_OAUTH_TOKEN_URL}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=password" \
            --data-urlencode "client_id=${SN_OAUTH_CLIENT_ID}" \
            --data-urlencode "client_secret=${SN_OAUTH_CLIENT_SECRET}" \
            --data-urlencode "username=${SN_OAUTH_USERNAME}" \
            --data-urlencode "password=${SN_OAUTH_PASSWORD}")"

          ACCESS_TOKEN="$(TOKEN_RESPONSE="${TOKEN_RESPONSE}" python3 - <<'PY'
          import json
          import os
          import sys

          raw = os.environ.get("TOKEN_RESPONSE", "")

          try:
              data = json.loads(raw)
          except Exception:
              print("ServiceNow OAuth response was not valid JSON.", file=sys.stderr)
              print(raw[:500], file=sys.stderr)
              sys.exit(1)

          token = data.get("access_token")

          if not token:
              print("ServiceNow OAuth did not return access_token.", file=sys.stderr)
              print("Response keys:", ", ".join(data.keys()), file=sys.stderr)
              sys.exit(1)

          print(token)
          PY
          )"

          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Build static pass ServiceNow payload
        shell: bash
        env:
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
          CMDB_CI_NAME: ${{ secrets.CMDB_CI_NAME }}

          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
          PR_LINK: ${{ steps.pr_data.outputs.pr_link }}
          PR_TITLE: ${{ steps.pr_data.outputs.pr_title }}
          SOURCE_BRANCH: ${{ steps.pr_data.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.pr_data.outputs.target_branch }}
          HEAD_SHA: ${{ steps.pr_data.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr_data.outputs.base_sha }}
          PR_AUTHOR: ${{ steps.pr_data.outputs.pr_author }}
          PR_STATE: ${{ steps.pr_data.outputs.pr_state }}
          REQUESTED_BY: ${{ steps.pr_data.outputs.requested_by }}
          MERGEABLE: ${{ steps.pr_data.outputs.mergeable }}
          MERGEABLE_STATE: ${{ steps.pr_data.outputs.mergeable_state }}
          CLOSED_AT: ${{ steps.pr_data.outputs.closed_at }}
          MERGED_AT: ${{ steps.pr_data.outputs.merged_at }}
          LATEST_APPROVER: ${{ steps.pr_data.outputs.latest_approver }}
          APPROVED_USERS_JSON: ${{ steps.pr_data.outputs.approved_users_json }}
          APPROVAL_NOTES: ${{ steps.pr_data.outputs.approval_notes }}
        run: |
          set -euo pipefail

          python3 <<'PY' > snow-static-pass-payload.json
          import datetime
          import json
          import os

          g = os.environ.get

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          end = (datetime.datetime.now(datetime.timezone.utc) + datetime.timedelta(hours=1)).strftime("%Y-%m-%dT%H:%M:%SZ")

          repo_full = g("GITHUB_REPOSITORY", "")
          owner = repo_full.split("/")[0] if "/" in repo_full else ""
          repo = repo_full.split("/")[1] if "/" in repo_full else repo_full

          server = g("GITHUB_SERVER_URL", "https://github.com")
          run_id = g("GITHUB_RUN_ID", "")
          run_attempt = g("GITHUB_RUN_ATTEMPT", "")
          workflow_name = g("GITHUB_WORKFLOW", "")
          run_url = f"{server}/{repo_full}/actions/runs/{run_id}"

          try:
              approvers = json.loads(g("APPROVED_USERS_JSON", "[]") or "[]")
          except Exception:
              approvers = []

          latest_approver = g("LATEST_APPROVER", "")

          if latest_approver and latest_approver not in approvers:
              approvers.append(latest_approver)

          approval_notes = g("APPROVAL_NOTES", "").strip()

          if not approval_notes and latest_approver:
              approval_notes = f"PR approved in GitHub by {latest_approver}."
          elif not approval_notes:
              approval_notes = "PR approved in GitHub. Static-pass SNOW test payload sent for SNOW team workflow testing."

          checks_detail = {
              "mode": "temporary_static_pass_for_snow_team_testing",
              "message": "Checks were not executed in this workflow. Results are intentionally marked PASSED to allow SNOW team end-to-end testing.",
              "checkov": "PASSED",
              "codeql": "PASSED",
              "gitleaks": "PASSED",
              "terraform_checks_dev": "PASSED",
              "terraform_checks_prod": "PASSED"
          }

          payload = {
              "shared_secret": g("SN_GITHUB_SHARED_SECRET", ""),
              "event_type": "pull_request_ready_for_snow_approval",
              "payload_mode": "temporary_static_pass",
              "owner": owner,
              "repo": repo,
              "repo_name": repo_full,

              "pr_number": int(g("PR_NUMBER", "0") or 0),
              "pr_link": g("PR_LINK", ""),
              "pr_title": g("PR_TITLE", ""),
              "source_branch": g("SOURCE_BRANCH", ""),
              "target_branch": g("TARGET_BRANCH", ""),
              "commit_sha": g("HEAD_SHA", ""),
              "head_sha": g("HEAD_SHA", ""),
              "base_sha": g("BASE_SHA", ""),

              "pr_author": g("PR_AUTHOR", ""),
              "pr_state": g("PR_STATE", ""),
              "requested_by": g("REQUESTED_BY", ""),
              "requester": g("REQUESTED_BY", ""),
              "requestor_github_username": g("REQUESTED_BY", ""),
              "requestor_email": "FROM_PR_COMMENT_OR_OKTA_MAPPING",

              "mergeable": g("MERGEABLE", ""),
              "mergeable_state": g("MERGEABLE_STATE", ""),
              "closed_at": g("CLOSED_AT", ""),
              "merged_at": g("MERGED_AT", ""),

              "approvers": approvers,
              "sme_approval_1": latest_approver,
              "approval_notes": approval_notes,

              "status": "waiting_for_snow",
              "approval_state": "requested",
              "status_context": "snow-approval",
              "deployment_gate_context": "snow-deployment-gate",

              "github_check_status": "success",
              "github_checks_status": "success",
              "github_checks_detail": json.dumps(checks_detail, separators=(",", ":")),

              "terraform_validate": "PASSED",
              "checkov_scan_result": "PASSED",
              "codeql_scan_result": "PASSED",
              "gitleaks_scan_result": "PASSED",
              "security_scan_result": "PASSED",

              "pipeline_run_id": run_id,
              "pipeline_run_attempt": run_attempt,
              "pipeline_url": run_url,
              "artifact_url": run_url,
              "workflow_name": workflow_name,
              "runner_type": "self-hosted",
              "runner_label": "snow-github",

              "github_callback_attempts": 0,
              "deployment_callback_expected": True,
              "deployment_callback_event_type": "deployment_result",
              "deployment_callback_source": "terraform-deploy-after-merge",

              "environment": "production",
              "cmdb_ci_name": g("CMDB_CI_NAME", ""),

              "priority": "medium",
              "risk": "medium",
              "impact": "medium",
              "justification": "Temporary static-pass end-to-end test for ServiceNow team. Real security and Terraform checks are intentionally bypassed only for this test workflow.",
              "implementation_plan": "After ServiceNow approval and PR merge, the existing Terraform deployment workflow deploys to AWS and sends the deployment callback to ServiceNow.",
              "impact_summary": "Production-bound Terraform change submitted for ServiceNow approval using temporary static-pass metadata.",
              "rollback_plan": "If rejected, do not merge. If deployed and rollback is required, revert the PR or apply the previous known-good Terraform version.",

              "planned_start_date": now,
              "planned_end_date": end,
              "triggered_at": now
          }

          print(json.dumps(payload, indent=2))
          PY

          echo "ServiceNow static-pass payload:"
          cat snow-static-pass-payload.json

      - name: Send static pass payload to ServiceNow
        shell: bash
        env:
          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_API_PATH: ${{ secrets.SN_API_PATH }}
          BEARER: ${{ steps.token.outputs.token }}
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
        run: |
          set -euo pipefail

          for item in SN_INSTANCE_URL SN_API_PATH BEARER SN_GITHUB_SHARED_SECRET; do
            if [ -z "${!item:-}" ]; then
              echo "Missing required value: ${item}"
              exit 1
            fi
          done

          URL="${SN_INSTANCE_URL}${SN_API_PATH}"

          echo "Sending static-pass payload to ServiceNow endpoint: ${URL}"

          curl --fail-with-body -sS \
            --request POST \
            --url "${URL}" \
            --header "Authorization: Bearer ${BEARER}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --header "X-GitHub-SNOW-Shared-Secret: ${SN_GITHUB_SHARED_SECRET}" \
            --data @snow-static-pass-payload.json

          echo "Static-pass ServiceNow payload sent successfully."

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## SNOW Static-Pass Test Workflow"
            echo ""
            echo "- Purpose: Temporary SNOW team end-to-end testing"
            echo "- PR: #${{ github.event.pull_request.number }}"
            echo "- Source branch: ${{ github.event.pull_request.head.ref }}"
            echo "- Target branch: ${{ github.event.pull_request.base.ref }}"
            echo "- Runner: self-hosted / snow-github"
            echo "- Static check results sent to SNOW: PASSED"
            echo "- Static GitHub statuses created: checkov, codeql, gitleaks, terraform-checks dev/prod"
            echo "- SNOW approval context still controlled by ServiceNow: snow-approval"
          } >> "$GITHUB_STEP_SUMMARY"
