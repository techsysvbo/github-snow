name: snow-simple-send-approved-pr-to-snow

on:
  pull_request_review:
    types:
      - submitted

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to send to ServiceNow"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: read

jobs:
  send-custom-payload-to-snow:
    name: send-custom-payload-to-snow

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.review.state == 'approved' &&
        github.event.pull_request.base.ref == 'main'
      )

    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Validate runner tools
        shell: bash
        run: |
          set -euo pipefail

          for command in curl gh python3; do
            if ! command -v "${command}" >/dev/null 2>&1; then
              echo "Missing required runner tool: ${command}"
              exit 1
            fi
          done

      - name: Read PR details and completed checks
        id: pr_data
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          TRIGGER_MODE: ${{ github.event_name }}
          EVENT_REVIEWER: ${{ github.event.review.user.login }}
          EVENT_REVIEW_BODY: ${{ github.event.review.body }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "PR number was not provided."
            exit 1
          fi

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            > pr.json

          BASE_BRANCH="$(python3 - <<'PY'
          import json
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          print(pr.get("base", {}).get("ref", ""))
          PY
          )"

          if [ "${BASE_BRANCH}" != "main" ]; then
            echo "This workflow only sends PRs targeting main."
            echo "Current target branch: ${BASE_BRANCH}"
            exit 1
          fi

          HEAD_SHA="$(python3 - <<'PY'
          import json
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          print(pr.get("head", {}).get("sha", ""))
          PY
          )"

          if [ -z "${HEAD_SHA}" ]; then
            echo "Could not determine PR head commit SHA."
            exit 1
          fi

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
            > checks.json

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews?per_page=100" \
            > reviews.json

          python3 <<'PY' > outputs.txt
          import json
          import os
          import sys
          from pathlib import Path

          pr = json.loads(Path("pr.json").read_text())
          checks_payload = json.loads(Path("checks.json").read_text())
          reviews = json.loads(Path("reviews.json").read_text())

          trigger_mode = os.environ.get("TRIGGER_MODE", "")
          event_reviewer = os.environ.get("EVENT_REVIEWER", "")
          event_review_body = os.environ.get("EVENT_REVIEW_BODY", "")

          check_runs = checks_payload.get("check_runs", [])

          def normalize(value):
              return (value or "").strip().lower()

          def check_result(run):
              status = normalize(run.get("status"))
              conclusion = normalize(run.get("conclusion"))

              if conclusion == "success":
                  return "PASSED"

              if conclusion in (
                  "failure",
                  "cancelled",
                  "timed_out",
                  "action_required",
                  "startup_failure",
              ):
                  return "FAILED"

              if conclusion in ("skipped", "neutral"):
                  return "SKIPPED"

              if status in ("queued", "in_progress", "waiting", "requested", "pending"):
                  return "PENDING"

              return "MISSING"

          def get_check_result(matchers):
              matches = []

              for run in check_runs:
                  name = normalize(run.get("name"))
                  for matcher in matchers:
                      matcher = normalize(matcher)

                      if matcher == name or matcher in name:
                          matches.append(run)
                          break

              if not matches:
                  return "MISSING"

              results = [check_result(run) for run in matches]

              if "FAILED" in results:
                  return "FAILED"

              if "PENDING" in results or "MISSING" in results:
                  return "PENDING"

              if all(result in ("PASSED", "SKIPPED") for result in results):
                  return "PASSED"

              return "PENDING"

          checkov = get_check_result(["checkov"])
          codeql = get_check_result(["codeql"])
          gitleaks = get_check_result(["gitleaks"])
          terraform_dev = get_check_result(["terraform-checks (dev)"])
          terraform_prod = get_check_result(["terraform-checks (prod)"])

          required_checks = [
              checkov,
              codeql,
              gitleaks,
              terraform_dev,
              terraform_prod,
          ]

          if any(item == "FAILED" for item in required_checks):
              overall_status = "failure"
          elif all(item in ("PASSED", "SKIPPED") for item in required_checks):
              overall_status = "success"
          else:
              overall_status = "pending"

          if overall_status != "success":
              print("Required checks are not all successful.", file=sys.stderr)
              print(f"Checkov: {checkov}", file=sys.stderr)
              print(f"CodeQL: {codeql}", file=sys.stderr)
              print(f"Gitleaks: {gitleaks}", file=sys.stderr)
              print(f"Terraform dev: {terraform_dev}", file=sys.stderr)
              print(f"Terraform prod: {terraform_prod}", file=sys.stderr)
              sys.exit(1)

          latest_review_by_user = {}

          for review in reviews:
              user = (review.get("user") or {}).get("login", "")

              if user:
                  latest_review_by_user[user] = review

          approved_users = []

          for user, review in latest_review_by_user.items():
              if str(review.get("state", "")).upper() == "APPROVED":
                  approved_users.append(user)

          approver = event_reviewer
          approval_notes = event_review_body.strip()

          if trigger_mode == "workflow_dispatch":
              approver = ""
              approval_notes = (
                  "Manual custom-payload test started from GitHub Actions. "
                  "This is a ServiceNow integration test only."
              )

          if not approval_notes and approver:
              approval_notes = f"PR approved in GitHub by {approver}."

          details = {
              "checkov": checkov,
              "codeql": codeql,
              "gitleaks": gitleaks,
              "terraform_checks_dev": terraform_dev,
              "terraform_checks_prod": terraform_prod,
              "check_runs": [
                  {
                      "name": run.get("name", ""),
                      "status": run.get("status", ""),
                      "conclusion": run.get("conclusion", ""),
                      "html_url": run.get("html_url", ""),
                  }
                  for run in check_runs
              ],
          }

          outputs = {
              "pr_number": str(pr.get("number", "")),
              "pr_link": pr.get("html_url", ""),
              "pr_title": pr.get("title", ""),
              "source_branch": pr.get("head", {}).get("ref", ""),
              "target_branch": pr.get("base", {}).get("ref", ""),
              "head_sha": pr.get("head", {}).get("sha", ""),
              "base_sha": pr.get("base", {}).get("sha", ""),
              "pr_author": pr.get("user", {}).get("login", ""),
              "pr_state": pr.get("state", ""),
              "requester": pr.get("user", {}).get("login", ""),
              "mergeable": "" if pr.get("mergeable") is None else str(pr.get("mergeable")).lower(),
              "mergeable_state": pr.get("mergeable_state", ""),
              "approver": approver,
              "approved_users_json": json.dumps(approved_users),
              "approval_notes": approval_notes,
              "github_checks_status": overall_status,
              "checkov_result": checkov,
              "codeql_result": codeql,
              "gitleaks_result": gitleaks,
              "terraform_dev_result": terraform_dev,
              "terraform_prod_result": terraform_prod,
              "github_checks_detail": json.dumps(details, separators=(",", ":")),
          }

          for key, value in outputs.items():
              print(f"{key}<<EOF")
              print("" if value is None else str(value))
              print("EOF")
          PY

          cat outputs.txt >> "$GITHUB_OUTPUT"

      - name: Build custom ServiceNow payload
        shell: bash
        env:
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
          CMDB_CI_NAME: ${{ vars.CMDB_CI_NAME }}

          PR_NUMBER: ${{ steps.pr_data.outputs.pr_number }}
          PR_LINK: ${{ steps.pr_data.outputs.pr_link }}
          PR_TITLE: ${{ steps.pr_data.outputs.pr_title }}
          SOURCE_BRANCH: ${{ steps.pr_data.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.pr_data.outputs.target_branch }}
          HEAD_SHA: ${{ steps.pr_data.outputs.head_sha }}
          BASE_SHA: ${{ steps.pr_data.outputs.base_sha }}
          PR_AUTHOR: ${{ steps.pr_data.outputs.pr_author }}
          PR_STATE: ${{ steps.pr_data.outputs.pr_state }}
          REQUESTER: ${{ steps.pr_data.outputs.requester }}
          MERGEABLE: ${{ steps.pr_data.outputs.mergeable }}
          MERGEABLE_STATE: ${{ steps.pr_data.outputs.mergeable_state }}
          APPROVER: ${{ steps.pr_data.outputs.approver }}
          APPROVED_USERS_JSON: ${{ steps.pr_data.outputs.approved_users_json }}
          APPROVAL_NOTES: ${{ steps.pr_data.outputs.approval_notes }}
          GITHUB_CHECKS_STATUS: ${{ steps.pr_data.outputs.github_checks_status }}
          GITHUB_CHECKS_DETAIL: ${{ steps.pr_data.outputs.github_checks_detail }}
          CHECKOV_RESULT: ${{ steps.pr_data.outputs.checkov_result }}
          CODEQL_RESULT: ${{ steps.pr_data.outputs.codeql_result }}
          GITLEAKS_RESULT: ${{ steps.pr_data.outputs.gitleaks_result }}
          TERRAFORM_DEV_RESULT: ${{ steps.pr_data.outputs.terraform_dev_result }}
          TERRAFORM_PROD_RESULT: ${{ steps.pr_data.outputs.terraform_prod_result }}
        run: |
          set -euo pipefail

          if [ -z "${SN_GITHUB_SHARED_SECRET:-}" ]; then
            echo "Missing GitHub secret: SN_GITHUB_SHARED_SECRET"
            exit 1
          fi

          python3 <<'PY' > snow-custom-payload.json
          import datetime
          import json
          import os

          g = os.environ.get

          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          end = (
              datetime.datetime.now(datetime.timezone.utc)
              + datetime.timedelta(hours=1)
          ).strftime("%Y-%m-%dT%H:%M:%SZ")

          repo_full = g("GITHUB_REPOSITORY", "")
          owner = repo_full.split("/")[0] if "/" in repo_full else ""
          repo = repo_full.split("/")[1] if "/" in repo_full else repo_full

          server = g("GITHUB_SERVER_URL", "https://github.com")
          run_id = g("GITHUB_RUN_ID", "")
          run_url = f"{server}/{repo_full}/actions/runs/{run_id}"

          try:
              approvers = json.loads(g("APPROVED_USERS_JSON", "[]") or "[]")
          except Exception:
              approvers = []

          approver = g("APPROVER", "")

          if approver and approver not in approvers:
              approvers.append(approver)

          cmdb_ci_name = g("CMDB_CI_NAME", "") or "ccoe-snow-webhook-demo-s3"

          payload = {
              "shared_secret": g("SN_GITHUB_SHARED_SECRET", ""),
              "event_type": "pull_request_ready_for_snow_approval",
              "payload_mode": "simple_custom_payload_test",

              "owner": owner,
              "repo": repo,
              "repo_name": repo_full,

              "pr_number": int(g("PR_NUMBER", "0") or 0),
              "pr_link": g("PR_LINK", ""),
              "pr_title": g("PR_TITLE", ""),
              "source_branch": g("SOURCE_BRANCH", ""),
              "target_branch": g("TARGET_BRANCH", ""),
              "commit_sha": g("HEAD_SHA", ""),
              "head_sha": g("HEAD_SHA", ""),
              "base_sha": g("BASE_SHA", ""),

              "pr_author": g("PR_AUTHOR", ""),
              "pr_state": g("PR_STATE", ""),
              "requested_by": g("REQUESTER", ""),
              "requester": g("REQUESTER", ""),
              "requestor_github_username": g("REQUESTER", ""),
              "requestor_email": "FROM_PR_COMMENT_OR_OKTA_MAPPING",

              "mergeable": g("MERGEABLE", ""),
              "mergeable_state": g("MERGEABLE_STATE", ""),

              "approvers": approvers,
              "sme_approval_1": approver,
              "approval_notes": g("APPROVAL_NOTES", ""),

              "status": "waiting_for_snow",
              "approval_state": "requested",
              "status_context": "snow-approval",

              "github_check_status": g("GITHUB_CHECKS_STATUS", ""),
              "github_checks_status": g("GITHUB_CHECKS_STATUS", ""),
              "github_checks_detail": g("GITHUB_CHECKS_DETAIL", ""),

              "terraform_validate": "PASSED",
              "checkov_scan_result": g("CHECKOV_RESULT", ""),
              "codeql_scan_result": g("CODEQL_RESULT", ""),
              "gitleaks_scan_result": g("GITLEAKS_RESULT", ""),
              "security_scan_result": "PASSED",
              "terraform_plan_summary": "Not collected in this simple custom-payload integration test.",

              "pipeline_run_id": run_id,
              "pipeline_url": run_url,
              "artifact_url": run_url,

              "environment": "production",
              "cmdb_ci_name": cmdb_ci_name,

              "priority": "medium",
              "risk": "medium",
              "impact": "medium",
              "justification": "Custom GitHub-to-ServiceNow payload integration test using completed GitHub checks.",
              "implementation_plan": "ServiceNow receives the custom payload and processes the PR approval record.",
              "impact_summary": "GitHub PR submitted to ServiceNow using a custom payload.",
              "rollback_plan": "Do not merge the PR if ServiceNow rejects the request.",

              "deployment_callback_expected": False,
              "github_callback_attempts": 0,

              "planned_start_date": now,
              "planned_end_date": end,
              "triggered_at": now,
          }

          print(json.dumps(payload, indent=2))
          PY

          echo "Custom payload file created."

          python3 - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("snow-custom-payload.json").read_text())

          summary = {
              "pr_number": payload.get("pr_number"),
              "repo_name": payload.get("repo_name"),
              "event_type": payload.get("event_type"),
              "payload_mode": payload.get("payload_mode"),
              "github_checks_status": payload.get("github_checks_status"),
              "environment": payload.get("environment"),
              "status_context": payload.get("status_context"),
          }

          print(json.dumps(summary, indent=2))
          PY

      - name: Send custom payload to ServiceNow
        shell: bash
        env:
          SN_APPROVAL_POST_URL: ${{ secrets.SN_APPROVAL_POST_URL }}
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SN_APPROVAL_POST_URL:-}" ]; then
            echo "Missing GitHub secret: SN_APPROVAL_POST_URL"
            exit 1
          fi

          if [ -z "${SN_GITHUB_SHARED_SECRET:-}" ]; then
            echo "Missing GitHub secret: SN_GITHUB_SHARED_SECRET"
            exit 1
          fi

          if [ ! -f snow-custom-payload.json ]; then
            echo "snow-custom-payload.json was not created."
            echo "Current files:"
            ls -la
            exit 1
          fi

          RESPONSE_FILE="$(mktemp)"

          trap 'rm -f "${RESPONSE_FILE}" snow-custom-payload.json pr.json checks.json reviews.json outputs.txt' EXIT

          HTTP_STATUS="$(
            curl \
              --silent \
              --show-error \
              --connect-timeout 20 \
              --max-time 120 \
              --output "${RESPONSE_FILE}" \
              --write-out "%{http_code}" \
              --request POST \
              --url "${SN_APPROVAL_POST_URL}" \
              --header "Content-Type: application/json" \
              --header "Accept: application/json" \
              --header "X-GitHub-SNOW-Shared-Secret: ${SN_GITHUB_SHARED_SECRET}" \
              --data-binary @snow-custom-payload.json
          )"

          echo "ServiceNow HTTP status: ${HTTP_STATUS}"

          if [[ ! "${HTTP_STATUS}" =~ ^2 ]]; then
            echo "ServiceNow did not accept the payload."
            echo "Response body:"
            head -c 1500 "${RESPONSE_FILE}" || true
            exit 1
          fi

          echo "ServiceNow accepted the custom payload."

      - name: Write summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Simple Custom ServiceNow Payload Test"
            echo ""
            echo "- PR: #${{ steps.pr_data.outputs.pr_number }}"
            echo "- GitHub checks: ${{ steps.pr_data.outputs.github_checks_status }}"
            echo "- Runner: self-hosted / snow-github"
            echo "- OAuth: intentionally not used in this test"
            echo "- Deployment callback: intentionally disabled in this test"
          } >> "$GITHUB_STEP_SUMMARY"
