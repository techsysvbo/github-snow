name: codeql

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  detect:
    name: codeql-detect-source
    runs-on: [self-hosted, linux, x64, snow-github]

    outputs:
      has_code: ${{ steps.detect.outputs.has_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - id: detect
        name: Detect source code for CodeQL
        shell: bash
        run: |
          set -euo pipefail

          if find . -path ./.git -prune -o \
            \( -name '*.js' -o -name '*.ts' -o -name '*.py' -o -name '*.go' \) \
            -print | grep -q .; then

            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "No supported source code found. CodeQL analysis will be skipped."
          fi

  analyze:
    name: codeql-analyze
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: [self-hosted, linux, x64, snow-github]

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure CA bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No trusted CA bundle found on the runner."
            exit 1
          fi

          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Run CodeQL analysis
        id: analyze_codeql
        uses: github/codeql-action/analyze@v4
        with:
          output: codeql-results
          upload: always
          wait-for-processing: true

      - name: Fail if CodeQL finds security alerts
        shell: bash
        env:
          SARIF_DIRECTORY: ${{ steps.analyze_codeql.outputs.sarif-output }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sarif_directory = os.environ.get(
              "SARIF_DIRECTORY", ""
          ).strip()

          if not sarif_directory:
              print(
                  "CodeQL did not return a SARIF output directory.",
                  file=sys.stderr,
              )
              sys.exit(1)

          root = Path(sarif_directory)

          if not root.exists():
              print(
                  f"CodeQL SARIF directory does not exist: {root}",
                  file=sys.stderr,
              )
              sys.exit(1)

          sarif_files = [
              path
              for path in root.rglob("*")
              if path.is_file()
              and (
                  path.name.endswith(".sarif")
                  or path.name.endswith(".sarif.json")
              )
          ]

          if not sarif_files:
              print(
                  f"No CodeQL SARIF files were found under: {root}",
                  file=sys.stderr,
              )
              sys.exit(1)

          findings = []

          for sarif_file in sarif_files:
              try:
                  sarif = json.loads(
                      sarif_file.read_text(encoding="utf-8")
                  )
              except (OSError, json.JSONDecodeError) as error:
                  print(
                      f"Unable to read SARIF file "
                      f"{sarif_file}: {error}",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              for run in sarif.get("runs", []):
                  for result in run.get("results", []):
                      rule_id = result.get(
                          "ruleId", "unknown-rule"
                      )

                      level = result.get(
                          "level", "warning"
                      )

                      message_data = result.get(
                          "message", {}
                      )

                      message = message_data.get(
                          "text", "No message provided."
                      )

                      message = " ".join(message.split())

                      file_name = "unknown-file"
                      line_number = "unknown-line"

                      locations = result.get(
                          "locations", []
                      )

                      if locations:
                          physical_location = locations[0].get(
                              "physicalLocation", {}
                          )

                          artifact_location = physical_location.get(
                              "artifactLocation", {}
                          )

                          region = physical_location.get(
                              "region", {}
                          )

                          file_name = artifact_location.get(
                              "uri", file_name
                          )

                          line_number = region.get(
                              "startLine", line_number
                          )

                      findings.append(
                          {
                              "rule_id": rule_id,
                              "level": level,
                              "message": message,
                              "file": file_name,
                              "line": line_number,
                          }
                      )

          summary_path = os.environ.get(
              "GITHUB_STEP_SUMMARY"
          )

          if summary_path:
              with open(
                  summary_path,
                  "a",
                  encoding="utf-8",
              ) as summary:
                  summary.write(
                      "## CodeQL security gate\n\n"
                  )

                  summary.write(
                      f"CodeQL findings detected: "
                      f"**{len(findings)}**\n\n"
                  )

                  for finding in findings:
                      summary.write(
                          f"- `{finding['rule_id']}` "
                          f"[{finding['level']}] "
                          f"{finding['file']}:"
                          f"{finding['line']} — "
                          f"{finding['message']}\n"
                      )

          if findings:
              print("")
              print("CodeQL security findings:")
              print("")

              for finding in findings:
                  print(
                      f"- {finding['rule_id']} "
                      f"[{finding['level']}] "
                      f"{finding['file']}:"
                      f"{finding['line']} - "
                      f"{finding['message']}"
                  )

              print("")
              print(
                  f"CodeQL security gate failed. "
                  f"Total findings: {len(findings)}"
              )

              sys.exit(1)

          print(
              "CodeQL security gate passed. "
              "No findings detected."
          )
          PY

      - name: Upload CodeQL SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}-${{ github.run_id }}
          path: ${{ steps.analyze_codeql.outputs.sarif-output }}
          retention-days: 7
          if-no-files-found: warn

  codeql:
    name: codeql
    needs:
      - detect
      - analyze
    if: always()
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Final CodeQL gate
        shell: bash
        run: |
          set -euo pipefail

          HAS_CODE="${{ needs.detect.outputs.has_code }}"
          ANALYZE_RESULT="${{ needs.analyze.result }}"

          echo "Supported source code found: ${HAS_CODE}"
          echo "CodeQL analysis result: ${ANALYZE_RESULT}"

          if [ "${HAS_CODE}" = "true" ] && \
             [ "${ANALYZE_RESULT}" != "success" ]; then
            echo "CodeQL security gate failed."
            exit 1
          fi

          echo "CodeQL gate passed."
