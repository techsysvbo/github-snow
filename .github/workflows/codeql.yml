name: CodeQL Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: codeql
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if JavaScript files exist
        id: js_check
        shell: bash
        run: |
          if find . -type f \( -name "*.js" -o -name "*.ts" \) \
            ! -path "./.git/*" \
            ! -path "./node_modules/*" | grep -q .; then
            echo "has_js=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_js=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.js_check.outputs.has_js == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Run CodeQL
        if: steps.js_check.outputs.has_js == 'true'
        uses: github/codeql-action/analyze@v4

      - name: No JavaScript found
        if: steps.js_check.outputs.has_js == 'false'
        run: echo "No JavaScript/TypeScript files found. Skipping CodeQL successfully."
