name: codeql

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - "feature/**"
      - "feature-*"
      - "fix/**"
      - "bugfix/**"
      - "hotfix/**"

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  detect:
    name: codeql-detect-source
    runs-on: ubuntu-latest
    outputs:
      has_code: ${{ steps.detect.outputs.has_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - id: detect
        name: Detect source code for CodeQL
        shell: bash
        run: |
          if find . -path ./.git -prune -o \
               \( -name '*.js' -o -name '*.ts' -o -name '*.py' -o -name '*.go' \) -print \
               | grep -q .; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "No JS, TS, Python, or Go source found. CodeQL analysis will be skipped."
          fi

  analyze:
    name: codeql-analyze
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4

  codeql:
    name: codeql
    needs:
      - detect
      - analyze
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Final CodeQL gate
        shell: bash
        run: |
          if [ "${{ needs.detect.outputs.has_code }}" = "true" ] && [ "${{ needs.analyze.result }}" != "success" ]; then
            echo "CodeQL analysis failed."
            exit 1
          fi

          echo "CodeQL gate passed."
