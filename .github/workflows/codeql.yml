name: codeql

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  # ==========================================================
  # 1. DETECT SUPPORTED CODEQL LANGUAGES
  # ==========================================================

  detect:
    name: codeql-detect-source
    runs-on: [self-hosted, linux, x64, snow-github]

    outputs:
      has_code: ${{ steps.detect.outputs.has_code }}
      matrix: ${{ steps.detect.outputs.matrix }}
      languages: ${{ steps.detect.outputs.languages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - id: detect
        name: Detect CodeQL-supported source
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(".")

          ignored_directories = {
              ".git",
              ".terraform",
              "node_modules",
              "vendor",
              "dist",
              "build",
              "coverage",
              "__pycache__",
              ".venv",
              "venv",
          }

          def is_ignored(path: Path) -> bool:
              return any(part in ignored_directories for part in path.parts)

          languages = []

          # --------------------------------------------------
          # GitHub Actions workflow detection
          # --------------------------------------------------

          workflow_directory = root / ".github" / "workflows"

          has_actions = (
              workflow_directory.exists()
              and any(
                  path.is_file()
                  and path.suffix.lower() in {".yml", ".yaml"}
                  for path in workflow_directory.rglob("*")
              )
          )

          if has_actions:
              languages.append(
                  {
                      "language": "actions",
                      "display_name": "GitHub Actions",
                  }
              )

          # --------------------------------------------------
          # Application source-code detection
          # --------------------------------------------------

          javascript_extensions = {
              ".js",
              ".jsx",
              ".mjs",
              ".cjs",
              ".ts",
              ".tsx",
          }

          has_javascript = False
          has_python = False
          has_go = False

          for path in root.rglob("*"):
              if not path.is_file() or is_ignored(path):
                  continue

              suffix = path.suffix.lower()

              if suffix in javascript_extensions:
                  has_javascript = True
              elif suffix == ".py":
                  has_python = True
              elif suffix == ".go":
                  has_go = True

          if has_javascript:
              languages.append(
                  {
                      "language": "javascript-typescript",
                      "display_name": "JavaScript/TypeScript",
                  }
              )

          if has_python:
              languages.append(
                  {
                      "language": "python",
                      "display_name": "Python",
                  }
              )

          if has_go:
              languages.append(
                  {
                      "language": "go",
                      "display_name": "Go",
                  }
              )

          has_code = bool(languages)

          matrix = {
              "include": languages
          }

          language_names = [
              item["display_name"]
              for item in languages
          ]

          output_file = Path(os.environ["GITHUB_OUTPUT"])

          with output_file.open("a", encoding="utf-8") as output:
              output.write(
                  f"has_code={'true' if has_code else 'false'}\n"
              )

              output.write(
                  "matrix="
                  + json.dumps(
                      matrix,
                      separators=(",", ":"),
                  )
                  + "\n"
              )

              output.write(
                  "languages="
                  + (
                      ", ".join(language_names)
                      if language_names
                      else "none"
                  )
                  + "\n"
              )

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")

          if summary_file:
              with open(
                  summary_file,
                  "a",
                  encoding="utf-8",
              ) as summary:
                  summary.write(
                      "## CodeQL source detection\n\n"
                  )

                  if language_names:
                      summary.write(
                          "**Detected languages:** "
                          + ", ".join(language_names)
                          + "\n"
                      )
                  else:
                      summary.write(
                          "**Status:** Not applicable — "
                          "no supported source code found.\n"
                      )

          print(
              "CodeQL-supported source detected:",
              "true" if has_code else "false",
          )

          print(
              "Languages:",
              ", ".join(language_names)
              if language_names
              else "none",
          )
          PY

  # ==========================================================
  # 2. RUN CODEQL FOR EACH DETECTED LANGUAGE
  # ==========================================================

  analyze:
    name: codeql-analyze (${{ matrix.display_name }})
    needs: detect

    if: needs.detect.outputs.has_code == 'true'

    runs-on: [self-hosted, linux, x64, snow-github]

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      # ------------------------------------------------------
      # Configure client-approved CA certificates
      # ------------------------------------------------------

      - name: Configure CA bundle
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No trusted CA bundle found on the runner."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"

          echo "Using CA bundle: ${CA_BUNDLE}"

      # ------------------------------------------------------
      # Initialize CodeQL
      #
      # security-extended adds additional security queries
      # beyond the default CodeQL security suite.
      # ------------------------------------------------------

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # ------------------------------------------------------
      # Go is compiled and may require autobuild.
      # This step is skipped for interpreted languages and
      # GitHub Actions workflow analysis.
      # ------------------------------------------------------

      - name: Autobuild Go source
        if: matrix.language == 'go'
        uses: github/codeql-action/autobuild@v4

      # ------------------------------------------------------
      # Run CodeQL and save SARIF results locally.
      #
      # CodeQL normally uploads alerts to GitHub but does not
      # fail simply because alerts were found. The next step
      # parses the SARIF results and enforces zero findings.
      # ------------------------------------------------------

      - name: Run CodeQL analysis
        id: analyze_codeql
        uses: github/codeql-action/analyze@v4
        with:
          output: codeql-results/${{ matrix.language }}
          upload: always
          wait-for-processing: true

      # ------------------------------------------------------
      # Strict security gate
      #
      # Any CodeQL SARIF result causes this job to fail.
      # ------------------------------------------------------

      - name: Fail if CodeQL finds security alerts
        shell: bash
        env:
          SARIF_DIRECTORY: ${{ steps.analyze_codeql.outputs.sarif-output }}
          CODEQL_LANGUAGE: ${{ matrix.display_name }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          sarif_directory = os.environ.get(
              "SARIF_DIRECTORY",
              "",
          ).strip()

          language = os.environ.get(
              "CODEQL_LANGUAGE",
              "Unknown",
          )

          if not sarif_directory:
              print(
                  "ERROR: CodeQL did not return a SARIF directory.",
                  file=sys.stderr,
              )
              sys.exit(1)

          root = Path(sarif_directory)

          if not root.exists():
              print(
                  f"ERROR: SARIF directory does not exist: {root}",
                  file=sys.stderr,
              )
              sys.exit(1)

          sarif_files = sorted(
              [
                  path
                  for path in root.rglob("*")
                  if path.is_file()
                  and (
                      path.name.endswith(".sarif")
                      or path.name.endswith(".sarif.json")
                  )
              ]
          )

          if not sarif_files:
              print(
                  f"ERROR: No SARIF files found under {root}",
                  file=sys.stderr,
              )
              sys.exit(1)

          findings = []

          for sarif_file in sarif_files:
              try:
                  data = json.loads(
                      sarif_file.read_text(
                          encoding="utf-8"
                      )
                  )
              except (
                  OSError,
                  json.JSONDecodeError,
              ) as error:
                  print(
                      f"ERROR: Could not read "
                      f"{sarif_file}: {error}",
                      file=sys.stderr,
                  )
                  sys.exit(1)

              for run in data.get("runs", []):
                  for result in run.get("results", []):
                      kind = result.get(
                          "kind",
                          "fail",
                      ).lower()

                      # Do not treat explicit passed or
                      # not-applicable results as alerts.
                      if kind in {
                          "pass",
                          "notapplicable",
                      }:
                          continue

                      rule_id = result.get(
                          "ruleId",
                          "unknown-rule",
                      )

                      level = result.get(
                          "level",
                          "warning",
                      )

                      message_data = result.get(
                          "message",
                          {},
                      )

                      message = message_data.get(
                          "text",
                          "No message provided.",
                      )

                      message = " ".join(
                          message.split()
                      )

                      file_name = "unknown-file"
                      line_number = 1
                      column_number = 1

                      locations = result.get(
                          "locations",
                          [],
                      )

                      if locations:
                          physical_location = (
                              locations[0].get(
                                  "physicalLocation",
                                  {},
                              )
                          )

                          artifact_location = (
                              physical_location.get(
                                  "artifactLocation",
                                  {},
                              )
                          )

                          region = (
                              physical_location.get(
                                  "region",
                                  {},
                              )
                          )

                          file_name = (
                              artifact_location.get(
                                  "uri",
                                  file_name,
                              )
                          )

                          line_number = region.get(
                              "startLine",
                              line_number,
                          )

                          column_number = region.get(
                              "startColumn",
                              column_number,
                          )

                      findings.append(
                          {
                              "rule_id": rule_id,
                              "level": level,
                              "message": message,
                              "file": file_name,
                              "line": line_number,
                              "column": column_number,
                          }
                      )

          # --------------------------------------------------
          # GitHub annotation escaping
          # --------------------------------------------------

          def workflow_escape(value):
              return (
                  str(value)
                  .replace("%", "%25")
                  .replace("\r", "%0D")
                  .replace("\n", "%0A")
              )

          # --------------------------------------------------
          # Add detailed findings to the workflow log
          # and annotate affected files.
          # --------------------------------------------------

          if findings:
              print("")
              print(
                  f"CodeQL security findings for {language}:"
              )
              print("")

              for finding in findings:
                  print(
                      f"- {finding['rule_id']} "
                      f"[{finding['level']}] "
                      f"{finding['file']}:"
                      f"{finding['line']}:"
                      f"{finding['column']} - "
                      f"{finding['message']}"
                  )

                  annotation_message = (
                      f"[{finding['rule_id']}] "
                      f"{finding['message']}"
                  )

                  print(
                      "::error "
                      f"file={workflow_escape(finding['file'])},"
                      f"line={finding['line']},"
                      f"col={finding['column']},"
                      f"title=CodeQL {workflow_escape(finding['rule_id'])}"
                      f"::{workflow_escape(annotation_message)}"
                  )

          # --------------------------------------------------
          # Write job summary
          # --------------------------------------------------

          summary_file = os.environ.get(
              "GITHUB_STEP_SUMMARY"
          )

          if summary_file:
              with open(
                  summary_file,
                  "a",
                  encoding="utf-8",
              ) as summary:
                  summary.write(
                      f"## CodeQL security gate — "
                      f"{language}\n\n"
                  )

                  summary.write(
                      f"**Alerts found:** "
                      f"{len(findings)}\n\n"
                  )

                  if findings:
                      summary.write(
                          "| Rule | Severity | "
                          "Location | Finding |\n"
                      )

                      summary.write(
                          "|---|---|---|---|\n"
                      )

                      for finding in findings:
                          safe_message = (
                              finding["message"]
                              .replace("|", "\\|")
                          )

                          safe_file = (
                              finding["file"]
                              .replace("|", "\\|")
                          )

                          summary.write(
                              f"| `{finding['rule_id']}` "
                              f"| {finding['level']} "
                              f"| `{safe_file}:"
                              f"{finding['line']}` "
                              f"| {safe_message} |\n"
                          )
                  else:
                      summary.write(
                          "No CodeQL security alerts "
                          "were detected.\n"
                      )

          # --------------------------------------------------
          # Enforce zero-alert policy
          # --------------------------------------------------

          if findings:
              print("")
              print(
                  "CodeQL security gate failed."
              )

              print(
                  f"Total alerts: {len(findings)}"
              )

              sys.exit(1)

          print(
              f"CodeQL security gate passed for "
              f"{language}. No alerts detected."
          )
          PY

      # ------------------------------------------------------
      # Save CodeQL results for seven days.
      # This still runs when the security gate fails.
      # ------------------------------------------------------

      - name: Upload CodeQL SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}-${{ github.run_id }}
          path: ${{ steps.analyze_codeql.outputs.sarif-output }}
          retention-days: 7
          if-no-files-found: warn

  # ==========================================================
  # 3. FINAL REQUIRED CODEQL CHECK
  #
  # This produces the consistent required status check:
  #
  #   codeql
  # ==========================================================

  codeql:
    name: codeql

    needs:
      - detect
      - analyze

    if: always()

    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Final CodeQL gate
        shell: bash
        env:
          HAS_CODE: ${{ needs.detect.outputs.has_code }}
          DETECTED_LANGUAGES: ${{ needs.detect.outputs.languages }}
          ANALYZE_RESULT: ${{ needs.analyze.result }}
        run: |
          set -euo pipefail

          echo "Supported source detected: ${HAS_CODE}"
          echo "Detected languages: ${DETECTED_LANGUAGES}"
          echo "CodeQL analysis result: ${ANALYZE_RESULT}"

          if [ "${HAS_CODE}" != "true" ]; then
            echo ""
            echo "CodeQL status: NOT APPLICABLE"
            echo "No supported source code was found."
            echo "Terraform security is evaluated by Checkov."
            exit 0
          fi

          if [ "${ANALYZE_RESULT}" != "success" ]; then
            echo ""
            echo "CodeQL security gate failed."
            echo "One or more CodeQL language scans failed or found alerts."
            exit 1
          fi

          echo ""
          echo "CodeQL security gate passed."
          echo "All detected CodeQL languages completed with zero alerts."
