name: codeql

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  detect:
    name: codeql-detect-source
    runs-on: [self-hosted, linux, x64, snow-github]

    outputs:
      has_code: ${{ steps.detect.outputs.has_code }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - id: detect
        name: Detect source code for CodeQL
        shell: bash
        run: |
          set -euo pipefail

          if find . -path ./.git -prune -o \
               \( -name '*.js' -o -name '*.ts' -o -name '*.py' -o -name '*.go' \) -print \
               | grep -q .; then
            echo "has_code=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_code=false" >> "$GITHUB_OUTPUT"
            echo "No JS, TS, Python, or Go source found. CodeQL analysis will be skipped."
          fi

  analyze:
    name: codeql-analyze
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: [self-hosted, linux, x64, snow-github]

    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Detect CA bundle path
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No known CA bundle found."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  codeql:
    name: codeql
    needs:
      - detect
      - analyze
    if: always()
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Final CodeQL gate
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.detect.outputs.has_code }}" = "true" ] && [ "${{ needs.analyze.result }}" != "success" ]; then
            echo "CodeQL analysis failed."
            exit 1
          fi

          echo "CodeQL gate passed."
