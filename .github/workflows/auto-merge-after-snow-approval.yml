name: auto-merge-after-snow-approval

on:
  status:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: read

jobs:
  auto-merge:
    name: auto-merge-after-snow-approval
    runs-on: ubuntu-latest

    steps:
      - name: Find PR with SNOW approvals and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_CONTEXT: ${{ github.event.context }}
          STATUS_STATE: ${{ github.event.state }}
        run: |
          set -euo pipefail

          echo "Triggered by: ${STATUS_CONTEXT:-manual} / ${STATUS_STATE:-manual}"

          # Only react to ServiceNow success statuses.
          if [ "${GITHUB_EVENT_NAME}" = "status" ]; then
            if [ "${STATUS_STATE}" != "success" ]; then
              echo "Status is not success. No-op."
              exit 0
            fi

            if [ "${STATUS_CONTEXT}" != "snow-approval" ] && [ "${STATUS_CONTEXT}" != "snow-deployment-gate" ]; then
              echo "Not a SNOW-controlled status. No-op."
              exit 0
            fi
          fi

          # Find open PRs targeting main.
          gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
            --jq '.[] | {number: .number, sha: .head.sha, draft: .draft}' > open-prs.jsonl

          if [ ! -s open-prs.jsonl ]; then
            echo "No open PRs targeting main."
            exit 0
          fi

          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["GITHUB_REPOSITORY"]

          def run_json(cmd):
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(result.stdout)
                  print(result.stderr)
                  sys.exit(result.returncode)
              return json.loads(result.stdout)

          eligible = None

          with open("open-prs.jsonl", "r", encoding="utf-8") as f:
              prs = [json.loads(line) for line in f if line.strip()]

          for pr in prs:
              number = pr["number"]
              sha = pr["sha"]

              if pr["draft"]:
                  print(f"Skipping PR #{number}: draft.")
                  continue

              status_data = run_json([
                  "gh", "api",
                  f"repos/{repo}/commits/{sha}/status"
              ])

              statuses = {}
              for s in status_data.get("statuses", []):
                  if s.get("context") not in statuses:
                      statuses[s.get("context")] = s.get("state")

              snow_approval = statuses.get("snow-approval")
              snow_deploy_gate = statuses.get("snow-deployment-gate")

              print(f"PR #{number}: snow-approval={snow_approval}")
              print(f"PR #{number}: snow-deployment-gate={snow_deploy_gate}")

              if snow_approval == "success" and snow_deploy_gate == "success":
                  eligible = number
                  break

          if not eligible:
              print("No PR has both SNOW gates green. No-op.")
              sys.exit(0)

          print(f"Attempting to merge PR #{eligible}.")

          # GitHub branch protection remains the final gate.
          # If Checkov, CodeQL, Gitleaks, Terraform checks, reviews, or up-to-date checks fail,
          # GitHub will reject this merge automatically.
          result = subprocess.run([
              "gh", "pr", "merge", str(eligible),
              "--squash",
              "--repo", repo
          ], capture_output=True, text=True)

          print(result.stdout)
          print(result.stderr)

          if result.returncode != 0:
              print("Merge failed. Branch protection is likely still blocking it.")
              sys.exit(result.returncode)

          print(f"PR #{eligible} merged successfully.")
          PY
