name: auto-merge-after-snow-approval

on:
  status:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: read

concurrency:
  group: auto-merge-after-snow-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-merge:
    name: auto-merge-after-snow-approval
    runs-on: ubuntu-latest

    steps:
      - name: Merge PR after SNOW deployment gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS_CONTEXT: ${{ github.event.context }}
          STATUS_STATE: ${{ github.event.state }}
        run: |
          set -euo pipefail

          echo "Triggered by: ${STATUS_CONTEXT:-manual} / ${STATUS_STATE:-manual}"

          # Only the final SNOW gate should trigger merge.
          # This prevents duplicate runs when SNOW sets both snow-approval and snow-deployment-gate.
          if [ "${GITHUB_EVENT_NAME}" = "status" ]; then
            if [ "${STATUS_CONTEXT}" != "snow-deployment-gate" ]; then
              echo "Not snow-deployment-gate. No-op."
              exit 0
            fi

            if [ "${STATUS_STATE}" != "success" ]; then
              echo "snow-deployment-gate is not success. No-op."
              exit 0
            fi
          fi

          gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
            --jq '.[] | {number: .number, sha: .head.sha, draft: .draft}' > open-prs.jsonl

          if [ ! -s open-prs.jsonl ]; then
            echo "No open PRs targeting main. No-op."
            exit 0
          fi

          python3 <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["GITHUB_REPOSITORY"]

          def run_json(cmd):
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode != 0:
                  print(result.stdout)
                  print(result.stderr)
                  sys.exit(result.returncode)
              return json.loads(result.stdout)

          with open("open-prs.jsonl", "r", encoding="utf-8") as f:
              prs = [json.loads(line) for line in f if line.strip()]

          for pr in prs:
              number = pr["number"]
              sha = pr["sha"]

              if pr["draft"]:
                  print(f"Skipping PR #{number}: draft.")
                  continue

              status_data = run_json([
                  "gh", "api",
                  f"repos/{repo}/commits/{sha}/status"
              ])

              statuses = {}
              for s in status_data.get("statuses", []):
                  context = s.get("context")
                  if context not in statuses:
                      statuses[context] = s.get("state")

              snow_approval = statuses.get("snow-approval")
              snow_gate = statuses.get("snow-deployment-gate")

              print(f"PR #{number}: snow-approval={snow_approval}")
              print(f"PR #{number}: snow-deployment-gate={snow_gate}")

              if snow_approval != "success" or snow_gate != "success":
                  continue

              print(f"Attempting to merge PR #{number}.")

              result = subprocess.run([
                  "gh", "pr", "merge", str(number),
                  "--squash",
                  "--repo", repo
              ], capture_output=True, text=True)

              print(result.stdout)
              print(result.stderr)

              combined = result.stdout + result.stderr

              if result.returncode != 0:
                  if "Merge already in progress" in combined:
                      print("Merge already in progress. Treating as success/no-op.")
                      sys.exit(0)

                  if "Pull Request is not mergeable" in combined:
                      print("PR is not mergeable yet. No-op.")
                      sys.exit(0)

                  print("Merge failed.")
                  sys.exit(result.returncode)

              print(f"PR #{number} merged successfully.")
              sys.exit(0)

          print("No PR has both SNOW gates green. No-op.")
          sys.exit(0)
          PY
