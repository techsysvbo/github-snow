name: Auto Merge After SNOW Approval

on:
  status

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  auto-merge:
    name: auto-merge-after-snow-approval
    runs-on: ubuntu-latest

    if: github.event.context == 'snow-approval' && github.event.state == 'success'

    steps:
      - name: Find PR for approved commit
        uses: actions/github-script@v9
        id: find_pr
        with:
          script: |
            const sha = context.payload.sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha
            });

            const pr = prs.data.find(p => p.state === "open" && p.base.ref === "main");

            if (!pr) {
              core.setFailed(`No open PR to main found for SHA ${sha}`);
              return;
            }

            core.setOutput("pr_number", pr.number);
            core.setOutput("head_sha", pr.head.sha);

      - name: Verify PR checks are green
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number("${{ steps.find_pr.outputs.pr_number }}");
            const sha = "${{ steps.find_pr.outputs.head_sha }}";

            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            const requiredChecks = ["checkov", "codeql", "gitleaks"];

            for (const required of requiredChecks) {
              const match = checks.data.check_runs.find(c =>
                c.name.toLowerCase().includes(required)
              );

              if (!match || match.conclusion !== "success") {
                core.setFailed(`${required} is not successful yet.`);
                return;
              }
            }

            core.info(`All required checks are green for PR #${prNumber}`);

      - name: Merge PR
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number("${{ steps.find_pr.outputs.pr_number }}");

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: "squash"
            });

            core.info(`Merged PR #${prNumber} after SNOW approval.`);
