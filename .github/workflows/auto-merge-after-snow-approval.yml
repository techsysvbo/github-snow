# 7yo: When SNOW turns both lights green, find the ready PR, recheck all safety
#      lights, then merge. If nothing is ready, finish happily (no fail).
# SME: Triggered on status events. Finds an open PR to main where both snow gates
#      are success AND combined checks success, not draft, then squash merges.
#      No eligible PR => no-op success (avoids race-condition red runs).
name: auto-merge-after-snow-approval
on:
  status: {}
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
  statuses: read
  checks: read
jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Find and merge an eligible PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRS=$(gh api "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main" \
                --jq '.[] | {number: .number, sha: .head.sha, draft: .draft}')
          if [ -z "${PRS}" ]; then
            echo "No open PRs targeting main. No-op."; exit 0
          fi
          echo "${PRS}" | python3 - <<'PY'
          import json, os, subprocess, sys
          repo = os.environ["GITHUB_REPOSITORY"]
          eligible = None
          for line in sys.stdin.read().splitlines():
              if not line.strip():
                  continue
              pr = json.loads(line)
              num, sha, draft = pr["number"], pr["sha"], pr["draft"]
              if draft:
                  continue
              raw = subprocess.run(
                  ["gh","api",f"repos/{repo}/commits/{sha}/status"],
                  capture_output=True, text=True, check=True).stdout
              data = json.loads(raw)
              ctx = {s["context"]: s["state"] for s in data.get("statuses", [])}
              overall = data.get("state")
              snow_ok = ctx.get("snow-approval") == "success" and \
                        ctx.get("snow-deployment-gate") == "success"
              checks_ok = overall == "success"
              print(f"PR #{num}: snow_ok={snow_ok} checks_ok={checks_ok} contexts={ctx}")
              if snow_ok and checks_ok:
                  eligible = num
                  break
          if eligible is None:
              print("No eligible PR yet (gates/checks not all green). No-op success.")
              sys.exit(0)
          print(f"Merging PR #{eligible} (squash).")
          subprocess.run(
              ["gh","pr","merge",str(eligible),"--squash","--auto","--repo",repo],
              check=True)
          PY
