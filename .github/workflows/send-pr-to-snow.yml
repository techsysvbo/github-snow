name: Send PR to ServiceNow

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  send-to-snow:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      statuses: write

    steps:
      - name: Set snow-approval to pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/${SHA}" \
            -d '{
              "state": "pending",
              "context": "snow-approval",
              "description": "Waiting for ServiceNow approval",
              "target_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'

      - name: Send PR payload to ServiceNow
        env:
          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_API_PATH: ${{ secrets.SN_API_PATH }}
          SN_API_USER: ${{ secrets.SN_API_USER }}
          SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          SOURCE_BRANCH: ${{ github.event.pull_request.head.ref }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          curl -X POST "${SN_INSTANCE_URL}${SN_API_PATH}" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -H "x-github-shared-secret: ${SN_GITHUB_SHARED_SECRET}" \
            -d "{
              \"pr_number\": \"${PR_NUMBER}\",
              \"repo_name\": \"${REPO_NAME}\",
              \"repo_full_name\": \"${REPO_FULL_NAME}\",
              \"pr_title\": \"${PR_TITLE}\",
              \"pr_url\": \"${PR_URL}\",
              \"pr_author\": \"${PR_AUTHOR}\",
              \"source_branch\": \"${SOURCE_BRANCH}\",
              \"target_branch\": \"${TARGET_BRANCH}\",
              \"commit_sha\": \"${COMMIT_SHA}\",
              \"environment\": \"prod\"
            }"
