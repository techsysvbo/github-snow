# Enterprise PR gate reset: bind ServiceNow approval to the current PR head SHA.
# When a PR is opened, reopened, or changed, the snow-approval context is reset to pending.
# ServiceNow must later set this exact commit status to success before merge.

name: reset-snow-gates-on-pr-change

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  statuses: write
  contents: read

jobs:
  reset-gates:
    name: reset-snow-approval
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Reset SNOW approval gate to pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context="snow-approval" \
            -f description="Pending: ServiceNow approval required"

          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" \
            -f state=pending \
            -f context="snow-deployment-gate" \
            -f description="Pending: Awaiting ServiceNow Change Request approval"
