# ============================================================================
# Workflow: SNOW Approval Pending
# Purpose: Sets the snow-approval status check to pending when PR opens
# Trigger: When PR is opened, reopened, or new commits are pushed to main
# ============================================================================

name: SNOW Approval Pending

on:
  # Trigger on these PR events
  pull_request:
    types: 
      - opened         # When PR first created
      - reopened       # When PR reopened after being closed
      - synchronize   # When new commits pushed to PR
    branches:
      - main           # Only for PRs targeting main branch

# Permissions needed for this workflow
permissions:
  contents: read       # Read access to repo content
  statuses: write      # Write access to set status checks

jobs:
  # This job sets the GitHub status check to pending
  set-pending:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Set the snow-approval status to pending
      - name: Set snow-approval to pending
        env:
          # GitHub provides these automatically
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        
        run: |
          # Use curl to call GitHub's REST API and set status
          curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${OWNER}/${REPO}/statuses/${SHA} \
            -d '{
              "state":"pending",
              "context":"snow-approval",
              "description":"Waiting for SNOW approval",
              "target_url":"'"${PR_URL}"'"
            }'
