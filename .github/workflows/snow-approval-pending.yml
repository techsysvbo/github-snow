# ============================================================================
# Workflow: SNOW Approval Pending
# Purpose: Sets the snow-approval status check to pending when PR opens
# Trigger: When PR is opened, reopened, or new commits are pushed to main
# ============================================================================
name: SNOW Approval Pending

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  set-pending:
    runs-on: ubuntu-latest

    steps:
      - name: Set snow-approval to pending
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          echo "Setting snow-approval to pending for SHA: ${SHA}"

          curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER}/${REPO}/statuses/${SHA}" \
            -d "{
              \"state\": \"pending\",
              \"context\": \"snow-approval\",
              \"description\": \"Waiting for ServiceNow approval\",
              \"target_url\": \"${PR_URL}\"
            }"
