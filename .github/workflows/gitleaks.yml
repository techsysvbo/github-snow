# 7yo: Reads the code for secrets someone left lying around; stops if found.
# SME: Scans working tree AND history for secrets/keys. Supports "no hardcoded passwords".
name: gitleaks
on:
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
