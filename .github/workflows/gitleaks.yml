name: gitleaks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: [self-hosted, linux, x64, snow-github]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect CA bundle path
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No known CA bundle found."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Install Gitleaks CLI
        shell: bash
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail

          mkdir -p "${RUNNER_TEMP}/gitleaks"

          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${RUNNER_TEMP}/gitleaks/gitleaks.tar.gz"

          tar -xzf "${RUNNER_TEMP}/gitleaks/gitleaks.tar.gz" -C "${RUNNER_TEMP}/gitleaks"

          chmod +x "${RUNNER_TEMP}/gitleaks/gitleaks"

          echo "${RUNNER_TEMP}/gitleaks" >> "$GITHUB_PATH"

      - name: Run Gitleaks secret scan
        shell: bash
        run: |
          set -euo pipefail

          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1
