# 7-year-old explanation:
# This workflow deploys only after code is merged into main.
# Before building in AWS, GitHub checks Terraform again to make sure it is still safe.
# After deployment, GitHub tells ServiceNow if deployment succeeded or failed.

# Expert explanation:
# This is the post-merge production deployment workflow.
# It reruns fmt/validate/checkov as a defense-in-depth gate before apply.
# It then calls ServiceNow back with deployment status and timestamp.

name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

jobs:
  deploy:
    name: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan before deploy
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Terraform plan
        working-directory: terraform/demo-s3
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        working-directory: terraform/demo-s3
        run: terraform apply -auto-approve -input=false

      - name: Notify ServiceNow deployment success
        if: success()
        run: |
          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"deployment_status\": \"success\",
              \"deployment_environment\": \"production\",
              \"deployment_pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"deployment_run_id\": \"${{ github.run_id }}\",
              \"deployment_timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

      - name: Notify ServiceNow deployment failure
        if: failure()
        run: |
          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"deployment_status\": \"failure\",
              \"deployment_environment\": \"production\",
              \"deployment_pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"deployment_run_id\": \"${{ github.run_id }}\",
              \"deployment_timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"
