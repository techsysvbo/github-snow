name: terraform-deploy-after-merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: read
  actions: read
  checks: read
  statuses: read

concurrency:
  group: tf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: terraform-deploy-production
    runs-on: [self-hosted, linux, x64, snow-github]
    environment: production

    env:
      AWS_REGION: ${{ secrets.AWS_GOVCLOUD_REGION }}
      TF_ENV_PATH: terraform/environments/prod-s3-demo
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_bucket_name: ${{ vars.TF_GOVCLOUD_S3_BUCKET_NAME }}
      TF_STATE_BUCKET: ${{ vars.TF_GOVCLOUD_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_GOVCLOUD_LOCK_TABLE }}
      SN_INSTANCE_URL: ${{ secrets.SN_GOVCLOUD_INSTANCE_URL }}
      SN_DEPLOYMENT_CALLBACK_PATH: ${{ secrets.SN_DEPLOYMENT_CALLBACK_PATH }}
      SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
      SN_OAUTH_TOKEN_URL: ${{ secrets.SN_OAUTH_GOVCLOUD_TOKEN_URL }}
      SN_OAUTH_CLIENT_ID: ${{ secrets.SN_OAUTH_CLIENT_ID }}
      SN_OAUTH_CLIENT_SECRET: ${{ secrets.SN_OAUTH_GOVCLOUD_CLIENT_SECRET }}
      SN_OAUTH_USERNAME: ${{ secrets.SN_OAUTH_USERNAME }}
      SN_OAUTH_PASSWORD: ${{ secrets.SN_OAUTH_PASSWORD }}

    steps:
      - name: Checkout main
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Detect CA bundle path
        shell: bash
        run: |
          set -euo pipefail

          if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
            CA_BUNDLE="/etc/ssl/certs/ca-certificates.crt"
          elif [ -f /etc/pki/tls/certs/ca-bundle.crt ]; then
            CA_BUNDLE="/etc/pki/tls/certs/ca-bundle.crt"
          else
            echo "No known CA bundle found."
            exit 1
          fi

          echo "SSL_CERT_FILE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "REQUESTS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "CURL_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "GIT_SSL_CAINFO=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "NODE_EXTRA_CA_CERTS=${CA_BUNDLE}" >> "$GITHUB_ENV"
          echo "AWS_CA_BUNDLE=${CA_BUNDLE}" >> "$GITHUB_ENV"

      - name: Collect merged PR metadata
        id: pr_meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" > merged-prs.json

          python3 <<'PY' > pr-meta-outputs.txt
          import json
          from pathlib import Path

          data = json.loads(Path("merged-prs.json").read_text())
          pr = data[0] if isinstance(data, list) and data else {}

          outputs = {
              "pr_number": pr.get("number", ""),
              "pr_link": pr.get("html_url", ""),
              "pr_title": pr.get("title", ""),
              "pr_author": pr.get("user", {}).get("login", ""),
              "pr_state": pr.get("state", ""),
              "requested_by": pr.get("user", {}).get("login", ""),
              "source_branch": pr.get("head", {}).get("ref", ""),
              "target_branch": pr.get("base", {}).get("ref", ""),
              "head_sha": pr.get("head", {}).get("sha", ""),
              "mergeable": "" if pr.get("mergeable") is None else str(pr.get("mergeable")).lower(),
              "mergeable_state": pr.get("mergeable_state", ""),
              "closed_at": pr.get("closed_at") or "",
              "merged_at": pr.get("merged_at") or ""
          }

          for key, value in outputs.items():
              print(f"{key}<<EOF")
              print("" if value is None else str(value))
              print("EOF")
          PY

          cat pr-meta-outputs.txt >> "$GITHUB_OUTPUT"

      - name: Collect PR GitHub check results
        id: github_checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ steps.pr_meta.outputs.head_sha }}
        run: |
          set -euo pipefail

          if [ -z "${PR_HEAD_SHA:-}" ]; then
            {
              echo "github_checks_status<<EOF"
              echo "unknown"
              echo "EOF"
              echo "checkov_scan_result<<EOF"
              echo "UNKNOWN"
              echo "EOF"
              echo "codeql_scan_result<<EOF"
              echo "UNKNOWN"
              echo "EOF"
              echo "gitleaks_scan_result<<EOF"
              echo "UNKNOWN"
              echo "EOF"
              echo "terraform_validate<<EOF"
              echo "UNKNOWN"
              echo "EOF"
              echo "security_scan_result<<EOF"
              echo "UNKNOWN"
              echo "EOF"
              echo "github_checks_detail<<EOF"
              echo "{}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs?per_page=100" > check-runs.json

          python3 <<'PY' > github-checks-outputs.txt
          import json
          from pathlib import Path

          checks_payload = json.loads(Path("check-runs.json").read_text())
          check_runs = checks_payload.get("check_runs", [])

          def norm(value):
              return (value or "").strip().lower()

          def to_result(conclusion, status):
              conclusion = norm(conclusion)
              status = norm(status)

              if conclusion == "success":
                  return "PASSED"
              if conclusion in ("failure", "cancelled", "timed_out", "action_required", "startup_failure"):
                  return "FAILED"
              if conclusion in ("skipped", "neutral"):
                  return "SKIPPED"
              if status in ("queued", "in_progress", "waiting", "requested", "pending"):
                  return "PENDING"
              return "MISSING"

          def matching_results(matchers):
              results = []
              for run in check_runs:
                  name = norm(run.get("name"))
                  workflow_name = norm(run.get("check_suite", {}).get("app", {}).get("name"))

                  for matcher in matchers:
                      matcher = norm(matcher)
                      if matcher == name or matcher in name or matcher in workflow_name:
                          results.append({
                              "name": run.get("name", ""),
                              "status": run.get("status", ""),
                              "conclusion": run.get("conclusion", ""),
                              "result": to_result(run.get("conclusion"), run.get("status")),
                              "html_url": run.get("html_url", "")
                          })
                          break
              return results

          def single_result(matchers):
              matches = matching_results(matchers)

              if not matches:
                  return "MISSING"
              if any(item["result"] == "FAILED" for item in matches):
                  return "FAILED"
              if any(item["result"] in ("PENDING", "MISSING") for item in matches):
                  return "PENDING"
              if all(item["result"] in ("PASSED", "SKIPPED") for item in matches):
                  return "PASSED"
              return "PENDING"

          checkov = single_result(["checkov"])
          codeql = single_result(["codeql"])
          gitleaks = single_result(["gitleaks"])
          terraform_dev = single_result(["terraform-checks (dev)"])
          terraform_prod = single_result(["terraform-checks (prod)"])

          required_results = [
              checkov,
              codeql,
              gitleaks,
              terraform_dev,
              terraform_prod
          ]

          if all(item in ("PASSED", "SKIPPED") for item in required_results):
              github_checks_status = "success"
          elif any(item == "FAILED" for item in required_results):
              github_checks_status = "failure"
          else:
              github_checks_status = "pending"

          details = {
              "checkov": checkov,
              "codeql": codeql,
              "gitleaks": gitleaks,
              "terraform_checks_dev": terraform_dev,
              "terraform_checks_prod": terraform_prod,
              "check_runs": [
                  {
                      "name": run.get("name", ""),
                      "status": run.get("status", ""),
                      "conclusion": run.get("conclusion", ""),
                      "html_url": run.get("html_url", "")
                  }
                  for run in check_runs
              ]
          }

          outputs = {
              "github_checks_status": github_checks_status,
              "checkov_scan_result": checkov,
              "codeql_scan_result": codeql,
              "gitleaks_scan_result": gitleaks,
              "terraform_validate": "PASSED" if terraform_dev in ("PASSED", "SKIPPED") and terraform_prod in ("PASSED", "SKIPPED") else "FAILED",
              "security_scan_result": "PASSED" if checkov in ("PASSED", "SKIPPED") and codeql in ("PASSED", "SKIPPED") and gitleaks in ("PASSED", "SKIPPED") else "FAILED",
              "github_checks_detail": json.dumps(details, separators=(",", ":"))
          }

          for key, value in outputs.items():
              print(f"{key}<<EOF")
              print("" if value is None else str(value))
              print("EOF")
          PY

          cat github-checks-outputs.txt >> "$GITHUB_OUTPUT"

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          missing="false"

          for item in AWS_REGION TF_STATE_BUCKET TF_LOCK_TABLE SN_INSTANCE_URL SN_DEPLOYMENT_CALLBACK_PATH SN_GITHUB_SHARED_SECRET SN_OAUTH_TOKEN_URL SN_OAUTH_CLIENT_ID SN_OAUTH_CLIENT_SECRET; do
            if [ -z "${!item:-}" ]; then
              echo "Missing required value: ${item}"
              missing="true"
            fi
          done

          if [ "${missing}" = "true" ]; then
            echo "Fix missing GitHub secrets or variables before deployment."
            exit 1
          fi

          echo "Deployment configuration is present."
          echo "AWS_REGION=${AWS_REGION}"
          echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}"
          echo "TF_LOCK_TABLE=${TF_LOCK_TABLE}"

      - name: Enforce ServiceNow deployment gate
        shell: bash
        env:
          PR_NUMBER: ${{ steps.pr_meta.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.pr_meta.outputs.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "Deployment blocked: PR number is missing. Open a new PR and restart approval flow."
            exit 1
          fi

          if [ -z "${PR_HEAD_SHA:-}" ]; then
            echo "Deployment blocked: PR head SHA is missing. Cannot verify deployment gate."
            exit 1
          fi

          # Check the snow-deployment-gate commit status set by ServiceNow on the PR head SHA
          # after a Change Request is approved.
          GATE_STATUS="$(gh api \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/statuses/${PR_HEAD_SHA}" \
            --jq '[.[] | select(.context == "snow-deployment-gate")] | if length > 0 then sort_by(.updated_at) | last | .state else "missing" end')"

          echo "ServiceNow deployment gate status: ${GATE_STATUS}"

          case "${GATE_STATUS}" in
            success)
              echo "SNOW gate open. Deployment allowed."
              ;;
            pending)
              echo "Deployment blocked: ServiceNow deployment gate is pending. Await Change Request approval."
              exit 1
              ;;
            failure|error)
              echo "Deployment blocked: ServiceNow deployment gate is ${GATE_STATUS}. Open a new PR and restart flow."
              exit 1
              ;;
            missing)
              echo "Deployment blocked: ServiceNow deployment gate status not found for this PR. Open a new PR and restart approval flow."
              exit 1
              ;;
            *)
              echo "Deployment blocked: unknown ServiceNow deployment gate state '${GATE_STATUS}'."
              exit 1
              ;;
          esac

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@1a78dfe5c0b12b88d2f1b0cbf8c08c6d9b0c2e60 # v5
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_WEST_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_GOVCLOUD_REGION }}
          role-session-name: gha-prod-deploy-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@8a232fbf4c41b8b2ea35621b4b9ca0fdf10dc076 # v3
        with:
          terraform_version: 1.9.5
            # terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_ENV_PATH }}
        run: |
          set -euo pipefail

          terraform init -input=false \
            -backend-config="bucket=${TF_GOVCLOUD_STATE_BUCKET}" \
            -backend-config="region=${AWS_GOVCLOUD_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_PATH }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_ENV_PATH }}
        run: |
          set -euo pipefail

          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > plan_summary.txt

          PLAN_LINE="$(grep -E 'Plan:|No changes' plan_summary.txt | tail -1 || echo 'Plan: see artifact')"

          {
            echo "summary<<EOF"
            echo "$PLAN_LINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        id: apply
        working-directory: ${{ env.TF_ENV_PATH }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Upload Terraform plan artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: ${{ env.TF_ENV_PATH }}/plan_summary.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Get ServiceNow OAuth token
        id: snow_token
        if: always()
        shell: bash
        env:
          SN_OAUTH_TOKEN_URL: ${{ secrets.SN_OAUTH_GOVCLOUD_TOKEN_URL }}
          SN_OAUTH_CLIENT_ID: ${{ secrets.SN_OAUTH_CLIENT_ID }}
          SN_OAUTH_CLIENT_SECRET: ${{ secrets.SN_OAUTH_GOVCLOUD_CLIENT_SECRET }}
          SN_OAUTH_USERNAME: ${{ secrets.SN_OAUTH_USERNAME }}
          SN_OAUTH_PASSWORD: ${{ secrets.SN_OAUTH_PASSWORD }}
        run: |
          set -euo pipefail

          for item in SN_OAUTH_TOKEN_URL SN_OAUTH_CLIENT_ID SN_OAUTH_CLIENT_SECRET SN_OAUTH_USERNAME SN_OAUTH_PASSWORD; do
            if [ -z "${!item:-}" ]; then
              echo "Missing required value: ${item}"
              exit 1
            fi
          done

          SN_OAUTH_TOKEN_URL="$(printf '%s' "${SN_OAUTH_TOKEN_URL}" | tr -d '\r\n')"
          SN_OAUTH_CLIENT_ID="$(printf '%s' "${SN_OAUTH_CLIENT_ID}" | tr -d '\r\n')"
          SN_OAUTH_CLIENT_SECRET="$(printf '%s' "${SN_OAUTH_CLIENT_SECRET}" | tr -d '\r\n')"
          SN_OAUTH_USERNAME="$(printf '%s' "${SN_OAUTH_USERNAME}" | tr -d '\r\n')"
          SN_OAUTH_PASSWORD="$(printf '%s' "${SN_OAUTH_PASSWORD}" | tr -d '\r\n')"

          TOKEN_FILE="$(mktemp)"
          trap 'rm -f "${TOKEN_FILE}"' EXIT

          request_token() {
            local grant="$1"
            local out_file="$2"

            local args=(
              --silent
              --show-error
              --fail-with-body
              --http1.1
              --tlsv1.2
              --connect-timeout 20
              --max-time 90
              --retry 2
              --retry-delay 2
              --output "${out_file}"
              --write-out "%{http_code}"
              --request POST
              --url "${SN_OAUTH_TOKEN_URL}"
              --header "Content-Type: application/x-www-form-urlencoded"
              --header "Accept: application/json"
              --data-urlencode "grant_type=${grant}"
              --data-urlencode "client_id=${SN_OAUTH_CLIENT_ID}"
              --data-urlencode "client_secret=${SN_OAUTH_CLIENT_SECRET}"
              --data-urlencode "username=${SN_OAUTH_USERNAME}"
              --data-urlencode "password=${SN_OAUTH_PASSWORD}"
            )

            if [ -n "${SSL_CERT_FILE:-}" ] && [ -f "${SSL_CERT_FILE}" ]; then
              args+=(--cacert "${SSL_CERT_FILE}")
            fi

            local http_status curl_exit
            set +e
            http_status="$(curl "${args[@]}")"
            curl_exit=$?
            set -e
            printf '%s:%s' "${curl_exit}" "${http_status}"
          }

          # Try client_credentials first (required by work SNOW instance).
          result="$(request_token "client_credentials" "${TOKEN_FILE}")"
          CURL_EXIT="${result%%:*}"
          HTTP_STATUS="${result##*:}"
          USED_GRANT="client_credentials"

          echo "ServiceNow OAuth HTTP status: ${HTTP_STATUS:-no-response} (grant: ${USED_GRANT})"

          # Auto-fallback to password grant if client_credentials is denied.
          # Handles instances where glide.oauth.inbound.client.credential.grant_type.enabled is off.
          if [ "${CURL_EXIT}" -eq 22 ] || [ "${HTTP_STATUS}" = "401" ] || [ "${HTTP_STATUS}" = "403" ]; then
            echo "client_credentials denied. Retrying with password grant."
            result="$(request_token "password" "${TOKEN_FILE}")"
            CURL_EXIT="${result%%:*}"
            HTTP_STATUS="${result##*:}"
            USED_GRANT="password"
            echo "ServiceNow OAuth HTTP status: ${HTTP_STATUS:-no-response} (grant: ${USED_GRANT})"
          fi

          if [ "${CURL_EXIT}" -ne 0 ] && [ "${CURL_EXIT}" -ne 22 ]; then
            echo "OAuth connection failed before ServiceNow returned a response."
            echo "curl exit code: ${CURL_EXIT}"
            exit "${CURL_EXIT}"
          fi

          if [[ ! "${HTTP_STATUS}" =~ ^2[0-9][0-9]$ ]]; then
            echo "ServiceNow rejected the OAuth request (tried client_credentials then password)."
            echo "ServiceNow response:"
            tr -d '\r' < "${TOKEN_FILE}" | head -c 1500 || true
            echo
            exit 1
          fi

          ACCESS_TOKEN="$(python3 - "${TOKEN_FILE}" <<'PY'
          import json
          import sys
          from pathlib import Path

          data = json.loads(Path(sys.argv[1]).read_text())
          token = data.get("access_token")
          if not token:
              print("No access_token in response. Keys: " + ", ".join(data.keys()), file=sys.stderr)
              sys.exit(1)
          print(token)
          PY
          )"

          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Notify ServiceNow deployment result
        if: always()
        shell: bash
        env:
          PR_NUMBER: ${{ steps.pr_meta.outputs.pr_number }}
          PR_LINK: ${{ steps.pr_meta.outputs.pr_link }}
          PR_TITLE: ${{ steps.pr_meta.outputs.pr_title }}
          PR_AUTHOR: ${{ steps.pr_meta.outputs.pr_author }}
          PR_STATE: ${{ steps.pr_meta.outputs.pr_state }}
          REQUESTED_BY: ${{ steps.pr_meta.outputs.requested_by }}
          SOURCE_BRANCH: ${{ steps.pr_meta.outputs.source_branch }}
          TARGET_BRANCH: ${{ steps.pr_meta.outputs.target_branch }}
          PR_HEAD_SHA: ${{ steps.pr_meta.outputs.head_sha }}
          MERGEABLE: ${{ steps.pr_meta.outputs.mergeable }}
          MERGEABLE_STATE: ${{ steps.pr_meta.outputs.mergeable_state }}
          CLOSED_AT: ${{ steps.pr_meta.outputs.closed_at }}
          MERGED_AT: ${{ steps.pr_meta.outputs.merged_at }}
          GITHUB_CHECKS_STATUS: ${{ steps.github_checks.outputs.github_checks_status }}
          GITHUB_CHECKS_DETAIL: ${{ steps.github_checks.outputs.github_checks_detail }}
          CHECKOV_SCAN_RESULT: ${{ steps.github_checks.outputs.checkov_scan_result }}
          CODEQL_SCAN_RESULT: ${{ steps.github_checks.outputs.codeql_scan_result }}
          GITLEAKS_SCAN_RESULT: ${{ steps.github_checks.outputs.gitleaks_scan_result }}
          TERRAFORM_VALIDATE: ${{ steps.github_checks.outputs.terraform_validate }}
          SECURITY_SCAN_RESULT: ${{ steps.github_checks.outputs.security_scan_result }}
          DEPLOY_OUTCOME: ${{ steps.apply.outcome }}
          PLAN_SUMMARY: ${{ steps.plan.outputs.summary }}
          BEARER: ${{ steps.snow_token.outputs.token }}
        run: |
          set -euo pipefail

          if [ "${DEPLOY_OUTCOME}" = "success" ]; then
            DSTATUS="success"
            DMSG="Terraform apply succeeded."
          else
            DSTATUS="failure"
            DMSG="Terraform apply failed or was skipped."
          fi

          export DSTATUS
          export DMSG

          CALLBACK_URL="${SN_INSTANCE_URL}${SN_DEPLOYMENT_CALLBACK_PATH}"

          python3 - <<'PY' > deployment-result.json
          import json
          import os
          import datetime

          g = os.environ.get

          repo_full = g("GITHUB_REPOSITORY", "")
          owner = repo_full.split("/")[0] if "/" in repo_full else ""
          repo = repo_full.split("/")[1] if "/" in repo_full else repo_full

          server = g("GITHUB_SERVER_URL", "https://github.com")
          run_id = g("GITHUB_RUN_ID", "")
          merge_sha = g("GITHUB_SHA", "")
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          run_url = f"{server}/{repo_full}/actions/runs/{run_id}"

          payload = {
              "shared_secret": g("SN_GITHUB_SHARED_SECRET", ""),
              "event_type": "deployment_result",
              "repo_name": repo_full,
              "repository_id": g("GITHUB_REPOSITORY_ID", ""),
              "owner": owner,
              "repo": repo,
              "pr_number": int(g("PR_NUMBER", "0") or 0),
              "pr_link": g("PR_LINK", ""),
              "pr_title": g("PR_TITLE", ""),
              "source_branch": g("SOURCE_BRANCH", ""),
              "target_branch": g("TARGET_BRANCH", ""),
              "pr_author": g("PR_AUTHOR", ""),
              "pr_state": g("PR_STATE", ""),
              "requested_by": g("REQUESTED_BY", ""),
              "mergeable": g("MERGEABLE", ""),
              "mergeable_state": g("MERGEABLE_STATE", ""),
              "closed_at": g("CLOSED_AT", ""),
              "merged_at": g("MERGED_AT", ""),
              "commit_sha": g("PR_HEAD_SHA", "") or merge_sha,
              "merge_commit_sha": merge_sha,
              "github_check_status": g("GITHUB_CHECKS_STATUS", ""),
              "github_checks_status": g("GITHUB_CHECKS_STATUS", ""),
              "github_checks_detail": g("GITHUB_CHECKS_DETAIL", ""),
              "terraform_validate": g("TERRAFORM_VALIDATE", ""),
              "checkov_scan_result": g("CHECKOV_SCAN_RESULT", ""),
              "codeql_scan_result": g("CODEQL_SCAN_RESULT", ""),
              "gitleaks_scan_result": g("GITLEAKS_SCAN_RESULT", ""),
              "security_scan_result": g("SECURITY_SCAN_RESULT", ""),
              "deployment_status": g("DSTATUS", "failure"),
              "deployment_message": g("DMSG", ""),
              "deployment_environment": "production",
              "deployment_pipeline_url": run_url,
              "deployment_run_id": run_id,
              "deployment_timestamp": now,
              "artifact_url": run_url,
              "github_callback_attempts": 1,
              "deployment_callback_attempts": 1,
              "approval_notes": "Deployment completed from GitHub Actions after PR merge.",
              "terraform_plan_summary": " ".join(g("PLAN_SUMMARY", "").split()) or "Terraform plan was not generated.",
              "callback_source": "github_actions_terraform_deploy_after_merge",
              "aws_region": g("AWS_REGION", "")
          }

          print(json.dumps(payload, indent=2))
          PY

          echo "Deployment result payload:"
          cat deployment-result.json

          CURL_ARGS=(
            --fail-with-body
            --silent
            --show-error
            --http1.1
            --tlsv1.2
            --connect-timeout 20
            --max-time 90
            --retry 2
            --retry-delay 2
            --request POST
            --header "Authorization: Bearer ${BEARER}"
            --header "Content-Type: application/json"
            --header "Accept: application/json"
            --header "X-GitHub-SNOW-Shared-Secret: ${SN_GITHUB_SHARED_SECRET}"
            --data @deployment-result.json
          )

          if [ -n "${SSL_CERT_FILE:-}" ] && [ -f "${SSL_CERT_FILE}" ]; then
            CURL_ARGS+=(--cacert "${SSL_CERT_FILE}")
          fi

          curl "${CURL_ARGS[@]}" "${CALLBACK_URL}"

          echo "ServiceNow deployment callback succeeded."
