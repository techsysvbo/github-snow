name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "terraform-modules/**"
      - "common-tags/**"

permissions:
  contents: read
  pull-requests: read
  statuses: write
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  # SNOW
  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

jobs:

  terraform-deploy:

    name: terraform-deploy

    runs-on:
      - self-hosted
      - linux

    strategy:
      fail-fast: false

      matrix:
        workload:

          # DEV S3
          - name: dev-s3
            path: terraform/environments/dev/s3
            tfvars: dev.tfvars
            role_arn: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
            aws_region: us-east-1

          # DEV EC2
          - name: dev-ec2
            path: terraform/environments/dev/ec2
            tfvars: dev.tfvars
            role_arn: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
            aws_region: us-east-1

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.workload.path }}

    steps:

      ####################################################################
      # STEP 1 — Checkout code
      ####################################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ####################################################################
      # STEP 2 — Assume AWS deployment role
      #
      # 12-year-old explanation:
      # GitHub first logs in with small AWS keys,
      # then AWS temporarily upgrades GitHub into the
      # deployment role that can deploy Terraform.
      #
      # SME explanation:
      # Base IAM user credentials assume the deployment role.
      # Terraform executes using temporary STS credentials.
      ####################################################################

      - name: Assume AWS deployment role
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

          role-to-assume: ${{ matrix.workload.role_arn }}

          role-session-name: github-terraform-prod-deploy

          aws-region: ${{ matrix.workload.aws_region }}

      ####################################################################
      # STEP 3 — Verify assumed role
      ####################################################################

      - name: Verify AWS caller identity
        run: |
          aws sts get-caller-identity

      ####################################################################
      # STEP 4 — Setup Terraform
      ####################################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ####################################################################
      # STEP 5 — Terraform format validation
      ####################################################################

      - name: Terraform fmt
        run: |
          terraform fmt -check -recursive

      ####################################################################
      # STEP 6 — Terraform init
      ####################################################################

      - name: Terraform init
        run: |
          terraform init -input=false

      ####################################################################
      # STEP 7 — Terraform validate
      ####################################################################

      - name: Terraform validate
        run: |
          terraform validate

      ####################################################################
      # STEP 8 — Terraform plan
      #
      # We store the plan summary for SNOW.
      ####################################################################

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -var-file=${{ matrix.workload.tfvars }} \
            -no-color \
            -out=tfplan | tee terraform-plan.txt

      ####################################################################
      # STEP 9 — Terraform apply
      #
      # ONLY runs after merge into main.
      ####################################################################

      - name: Terraform apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan

      ####################################################################
      # STEP 10 — Upload Terraform plan artifact
      ####################################################################

      - name: Upload Terraform plan artifact
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: terraform-plan-${{ matrix.workload.name }}
          path: |
            ${{ matrix.workload.path }}/terraform-plan.txt

      ####################################################################
      # STEP 11 — Send SUCCESS deployment callback to SNOW
      ####################################################################

      - name: Notify SNOW deployment success

        if: success()

        env:
          DEPLOYMENT_STATUS: success
          WORKLOAD_NAME: ${{ matrix.workload.name }}
          AWS_REGION: ${{ matrix.workload.aws_region }}

        run: |

          set -euo pipefail

          PLAN_SUMMARY=$(grep -E "Plan:|No changes" terraform-plan.txt | tail -1 || true)

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg deployment_status "$DEPLOYMENT_STATUS" \
            --arg repo_name "${GITHUB_REPOSITORY}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg deployment_pipeline_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg deployment_run_id "${GITHUB_RUN_ID}" \
            --arg deployment_environment "production" \
            --arg workload "$WORKLOAD_NAME" \
            --arg region "$AWS_REGION" \
            --arg terraform_plan_summary "$PLAN_SUMMARY" \
            '{
              shared_secret: $shared_secret,
              deployment_status: $deployment_status,
              repo_name: $repo_name,
              commit_sha: $commit_sha,
              deployment_pipeline_url: $deployment_pipeline_url,
              deployment_run_id: $deployment_run_id,
              deployment_environment: $deployment_environment,
              workload: $workload,
              region: $region,
              terraform_plan_summary: $terraform_plan_summary
            }' > deployment-success.json

          echo "Sending SUCCESS callback to SNOW..."

          curl --fail-with-body -sS \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            --data @deployment-success.json

      ####################################################################
      # STEP 12 — Send FAILED deployment callback to SNOW
      ####################################################################

      - name: Notify SNOW deployment failure

        if: failure()

        env:
          DEPLOYMENT_STATUS: failed
          WORKLOAD_NAME: ${{ matrix.workload.name }}
          AWS_REGION: ${{ matrix.workload.aws_region }}

        run: |

          set -euo pipefail

          PLAN_SUMMARY=$(grep -E "Plan:|No changes" terraform-plan.txt | tail -1 || true)

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg deployment_status "$DEPLOYMENT_STATUS" \
            --arg repo_name "${GITHUB_REPOSITORY}" \
            --arg commit_sha "${GITHUB_SHA}" \
            --arg deployment_pipeline_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg deployment_run_id "${GITHUB_RUN_ID}" \
            --arg deployment_environment "production" \
            --arg workload "$WORKLOAD_NAME" \
            --arg region "$AWS_REGION" \
            --arg terraform_plan_summary "$PLAN_SUMMARY" \
            '{
              shared_secret: $shared_secret,
              deployment_status: $deployment_status,
              repo_name: $repo_name,
              commit_sha: $commit_sha,
              deployment_pipeline_url: $deployment_pipeline_url,
              deployment_run_id: $deployment_run_id,
              deployment_environment: $deployment_environment,
              workload: $workload,
              region: $region,
              terraform_plan_summary: $terraform_plan_summary
            }' > deployment-failure.json

          echo "Sending FAILURE callback to SNOW..."

          curl -sS \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X POST \
            "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            --data @deployment-failure.json
