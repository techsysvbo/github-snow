name: terraform-deploy-after-merge

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: tf-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: terraform-deploy-production
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_ENV_PATH: terraform/environments/prod
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          missing="false"

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 🔴 SECURITY FIX #3: AWS CONFIGURATION VALIDATION
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 7yo: Check we have all the magic passwords before we start.
          # SME: Validates AWS credentials and Terraform backend variables exist.
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          if [ -z "${AWS_REGION}" ]; then
            echo "Missing AWS_REGION secret."
            missing="true"
          fi

          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "Missing TF_STATE_BUCKET repository variable."
            missing="true"
          fi

          if [ -z "${TF_LOCK_TABLE}" ]; then
            echo "Missing TF_LOCK_TABLE repository variable."
            missing="true"
          fi

          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 🔴 SECURITY FIX #4: SERVICENOW CALLBACK VALIDATION
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 7yo: Check we can talk to ServiceNow before we deploy anything.
          # SME: ADDED: Early validation of ServiceNow secrets to fail fast.
          #      Previously failed at curl step (near end of job). Now fails early,
          #      saving time and preventing partial deployments from being notified.
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          if [ -z "${SN_INSTANCE_URL:-}" ]; then
            echo "Missing SN_INSTANCE_URL secret."
            missing="true"
          fi

          if [ -z "${SN_DEPLOYMENT_CALLBACK_PATH:-}" ]; then
            echo "Missing SN_DEPLOYMENT_CALLBACK_PATH secret."
            missing="true"
          fi

          if [ -z "${SN_API_USER:-}" ]; then
            echo "Missing SN_API_USER secret."
            missing="true"
          fi

          if [ -z "${SN_API_PASSWORD:-}" ]; then
            echo "Missing SN_API_PASSWORD secret."
            missing="true"
          fi

          if [ -z "${SN_GITHUB_SHARED_SECRET:-}" ]; then
            echo "Missing SN_GITHUB_SHARED_SECRET secret."
            missing="true"
          fi

          if [ "${missing}" = "true" ]; then
            echo "Fix missing GitHub secrets or variables before deployment."
            exit 1
          fi

          echo "✓ Deployment configuration is present."
          echo "✓ AWS_REGION=${AWS_REGION}"
          echo "✓ TF_STATE_BUCKET=${TF_STATE_BUCKET}"
          echo "✓ TF_LOCK_TABLE=${TF_LOCK_TABLE}"
          echo "✓ ServiceNow integration configured"

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-prod-deploy-${{ github.run_id }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform init
        working-directory: ${{ env.TF_ENV_PATH }}
        run: |
          set -euo pipefail

          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform validate
        working-directory: ${{ env.TF_ENV_PATH }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_ENV_PATH }}
        run: |
          set -euo pipefail

          terraform plan -input=false -out=tfplan
          terraform show -no-color tfplan > plan_summary.txt

          PLAN_LINE="$(grep -E 'Plan:|No changes' plan_summary.txt | tail -1 || echo 'Plan: see artifact')"

          {
            echo "summary<<EOF"
            echo "$PLAN_LINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        id: apply
        working-directory: ${{ env.TF_ENV_PATH }}
        run: terraform apply -input=false -auto-approve tfplan

      - name: Upload Terraform plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: ${{ env.TF_ENV_PATH }}/plan_summary.txt
          retention-days: 90
          if-no-files-found: ignore

      - name: Notify ServiceNow deployment result
        if: always()
        shell: bash
        env:
          SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
          SN_DEPLOYMENT_CALLBACK_PATH: ${{ secrets.SN_DEPLOYMENT_CALLBACK_PATH }}
          SN_API_USER: ${{ secrets.SN_API_USER }}
          SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
          SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

          DEPLOY_OUTCOME: ${{ steps.apply.outcome }}
          PLAN_SUMMARY: ${{ steps.plan.outputs.summary }}
        run: |
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 🔴 SECURITY FIX #5: IMPROVED SERVICENOW CALLBACK ERROR HANDLING
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          # 7yo: Tell ServiceNow what happened, and make sure they heard us.
          # SME: CHANGED: Added error handling so if ServiceNow notification fails,
          #      the workflow job also fails. Previously, job would succeed even if
          #      curl failed (no set -e). This ensures deployment status is reliably
          #      communicated before job completes.
          # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

          set -eo pipefail

          if [ "${DEPLOY_OUTCOME}" = "success" ]; then
            DSTATUS="success"
          else
            DSTATUS="failure"
          fi

          CALLBACK_URL="${SN_INSTANCE_URL}${SN_DEPLOYMENT_CALLBACK_PATH}"

          echo "ℹ Sending deployment callback to ServiceNow:"
          echo "  URL: ${CALLBACK_URL}"

          python3 - <<'PY' > deployment-result.json
          import json
          import os
          import datetime

          g = os.environ.get

          repo_full = g("GITHUB_REPOSITORY", "")
          owner = repo_full.split("/")[0] if "/" in repo_full else ""
          repo = repo_full.split("/")[1] if "/" in repo_full else repo_full
          server = g("GITHUB_SERVER_URL", "https://github.com")
          run_id = g("GITHUB_RUN_ID", "")
          sha = g("GITHUB_SHA", "")

          payload = {
              "shared_secret": g("SN_GITHUB_SHARED_SECRET", ""),
              "event_type": "deployment_result",

              "repo_name": repo_full,
              "owner": owner,
              "repo": repo,

              "commit_sha": sha,
              "merge_commit_sha": sha,

              "deployment_status": g("DSTATUS", "failure"),
              "deployment_environment": "production",
              "deployment_pipeline_url": f"{server}/{repo_full}/actions/runs/{run_id}",
              "deployment_run_id": run_id,
              "deployment_timestamp": datetime.datetime.now(datetime.UTC).strftime("%Y-%m-%dT%H:%M:%SZ"),

              "terraform_plan_summary": " ".join(g("PLAN_SUMMARY", "").split()) or "Terraform plan was not generated.",
              "callback_source": "github_actions_terraform_deploy_after_merge",
              "aws_region": g("AWS_REGION", "")
          }

          print(json.dumps(payload, indent=2))
          PY

          echo ""
          echo "📋 Deployment result payload:"
          cat deployment-result.json

          echo ""
          echo "🔗 Sending to ServiceNow..."
          
          # --fail-with-body: fail on HTTP >= 400, and output response body on failure
          curl --fail-with-body -sS \
            --request POST \
            --user "${SN_API_USER}:${SN_API_PASSWORD}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --header "X-GitHub-SNOW-Shared-Secret: ${SN_GITHUB_SHARED_SECRET}" \
            --data @deployment-result.json \
            "${CALLBACK_URL}"

          echo ""
          echo "✅ ServiceNow deployment callback succeeded"
