name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}
  CMDB_CI_NAME: ${{ vars.CMDB_CI_NAME }}

jobs:
  terraform-apply:
    name: terraform-apply
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan before deploy
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Terraform plan
        working-directory: terraform/demo-s3
        run: terraform plan -input=false -no-color | tee terraform-plan.txt

      - name: Terraform apply
        working-directory: terraform/demo-s3
        run: terraform apply -auto-approve -input=false

      - name: Notify ServiceNow deployment success
        if: success()
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "shared_secret": os.environ["SN_GITHUB_SHARED_SECRET"],
              "repo_name": os.environ["GITHUB_REPOSITORY"],
              "commit_sha": os.environ["GITHUB_SHA"],
              "merge_commit_sha": os.environ["GITHUB_SHA"],
              "cmdb_ci_name": os.environ.get("CMDB_CI_NAME", ""),
              "deployment_status": "success",
              "deployment_environment": "production",
              "deployment_pipeline_url": f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',
              "deployment_run_id": os.environ["GITHUB_RUN_ID"],
              "deployment_timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("deployment_result_payload.json", "w") as f:
              json.dump(payload, f)
          PY

          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            --data @deployment_result_payload.json

      - name: Notify ServiceNow deployment failure
        if: failure()
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "shared_secret": os.environ["SN_GITHUB_SHARED_SECRET"],
              "repo_name": os.environ["GITHUB_REPOSITORY"],
              "commit_sha": os.environ["GITHUB_SHA"],
              "merge_commit_sha": os.environ["GITHUB_SHA"],
              "cmdb_ci_name": os.environ.get("CMDB_CI_NAME", ""),
              "deployment_status": "failure",
              "deployment_environment": "production",
              "deployment_pipeline_url": f'{os.environ["GITHUB_SERVER_URL"]}/{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}',
              "deployment_run_id": os.environ["GITHUB_RUN_ID"],
              "deployment_timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("deployment_result_payload.json", "w") as f:
              json.dump(payload, f)
          PY

          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            --data @deployment_result_payload.json
