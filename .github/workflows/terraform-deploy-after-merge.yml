name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      workload:
        description: "Workload to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - dev-s3
          - dev-ec2

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

jobs:
  terraform-deploy:
    name: terraform-deploy-${{ matrix.workload.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        workload:
          - name: dev-s3
            path: terraform/environments/dev/s3
            tfvars: dev.tfvars
            aws_region: us-east-1
          - name: dev-ec2
            path: terraform/environments/dev/ec2
            tfvars: dev.tfvars
            aws_region: us-east-1

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.workload.path }}

    steps:
      - name: Skip workload when workflow_dispatch selected a different workload
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.workload != 'all' && github.event.inputs.workload != matrix.workload.name
        run: |
          echo "Skipping ${{ matrix.workload.name }} because workflow_dispatch selected ${{ github.event.inputs.workload }}."

      - name: Checkout repository
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        uses: actions/checkout@v5

      - name: Configure AWS credentials using OIDC AssumeRole
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
          role-session-name: github-snow-terraform-${{ matrix.workload.name }}
          aws-region: ${{ matrix.workload.aws_region }}

      - name: Verify AWS caller identity
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: aws sts get-caller-identity

      - name: Setup Terraform
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: terraform fmt -check -recursive

      - name: Terraform init
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: terraform init -input=false

      - name: Terraform validate
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: terraform validate

      - name: Terraform plan
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: |
          set -euo pipefail

          if [ -f "${{ matrix.workload.tfvars }}" ]; then
            terraform plan \
              -input=false \
              -var-file="${{ matrix.workload.tfvars }}" \
              -no-color \
              -out=tfplan | tee terraform-plan.txt
          else
            terraform plan \
              -input=false \
              -no-color \
              -out=tfplan | tee terraform-plan.txt
          fi

      - name: Terraform apply
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.workload == 'all' || github.event.inputs.workload == matrix.workload.name
        run: terraform apply -auto-approve -input=false tfplan

      - name: Upload Terraform plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.workload.name }}
          path: ${{ matrix.workload.path }}/terraform-plan.txt
          if-no-files-found: ignore

      - name: Notify SNOW deployment success
        if: success()
        env:
          DEPLOYMENT_STATUS: success
          WORKLOAD_NAME: ${{ matrix.workload.name }}
          AWS_REGION: ${{ matrix.workload.aws_region }}
        run: |
          set -euo pipefail

          PLAN_SUMMARY=$(grep -E "Plan:|No changes" terraform-plan.txt | tail -1 || true)

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg deployment_status "$DEPLOYMENT_STATUS" \
            --arg repo_name "$GITHUB_REPOSITORY" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg merge_commit_sha "$GITHUB_SHA" \
            --arg deployment_pipeline_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg deployment_run_id "$GITHUB_RUN_ID" \
            --arg deployment_environment "dev" \
            --arg workload "$WORKLOAD_NAME" \
            --arg region "$AWS_REGION" \
            --arg terraform_plan_summary "$PLAN_SUMMARY" \
            '{
              shared_secret: $shared_secret,
              event_type: "deployment_result",
              deployment_status: $deployment_status,
              repo_name: $repo_name,
              commit_sha: $commit_sha,
              merge_commit_sha: $merge_commit_sha,
              deployment_pipeline_url: $deployment_pipeline_url,
              deployment_run_id: $deployment_run_id,
              deployment_environment: $deployment_environment,
              workload: $workload,
              region: $region,
              terraform_plan_summary: $terraform_plan_summary
            }' > deployment-success.json

          curl --fail-with-body -sS \
            -u "$SN_API_USER:$SN_API_PASSWORD" \
            -H "Content-Type: application/json" \
            -X POST \
            "$SN_INSTANCE_URL/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            --data @deployment-success.json

      - name: Notify SNOW deployment failure
        if: failure()
        env:
          DEPLOYMENT_STATUS: failed
          WORKLOAD_NAME: ${{ matrix.workload.name }}
          AWS_REGION: ${{ matrix.workload.aws_region }}
        run: |
          set -euo pipefail

          PLAN_SUMMARY=""
          if [ -f terraform-plan.txt ]; then
            PLAN_SUMMARY=$(grep -E "Plan:|No changes" terraform-plan.txt | tail -1 || true)
          fi

          jq -n \
            --arg shared_secret "$SN_GITHUB_SHARED_SECRET" \
            --arg deployment_status "$DEPLOYMENT_STATUS" \
            --arg repo_name "$GITHUB_REPOSITORY" \
            --arg commit_sha "$GITHUB_SHA" \
            --arg merge_commit_sha "$GITHUB_SHA" \
            --arg deployment_pipeline_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg deployment_run_id "$GITHUB_RUN_ID" \
            --arg deployment_environment "dev" \
            --arg workload "$WORKLOAD_NAME" \
            --arg region "$AWS_REGION" \
            --arg terraform_plan_summary "$PLAN_SUMMARY" \
            '{
              shared_secret: $shared_secret,
              event_type: "deployment_result",
              deployment_status: $deployment_status,
              repo_name: $repo_name,
              commit_sha: $commit_sha,
              merge_commit_sha: $merge_commit_sha,
              deployment_pipeline_url: $deployment_pipeline_url,
              deployment_run_id: $deployment_run_id,
              deployment_environment: $deployment_environment,
              workload: $workload,
              region: $region,
              terraform_plan_summary: $terraform_plan_summary
            }' > deployment-failure.json

          curl -sS \
            -u "$SN_API_USER:$SN_API_PASSWORD" \
            -H "Content-Type: application/json" \
            -X POST \
            "$SN_INSTANCE_URL/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            --data @deployment-failure.json
