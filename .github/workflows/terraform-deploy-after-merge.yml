# This workflow deploys only after merge to main.
# 7-year-old explanation:
# Nothing goes to AWS until GitHub and ServiceNow both say yes.

name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  # These match your GitHub secrets exactly.
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  deploy:
    name: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        # Downloads the approved main branch code.
        uses: actions/checkout@v5

      - name: Setup Terraform
        # Installs Terraform.
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        # Prepares Terraform.
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform plan
        # Shows what Terraform will deploy.
        working-directory: terraform/demo-s3
        run: terraform plan -input=false -no-color

      - name: Terraform apply
        # Deploys to AWS after merge to main.
        working-directory: terraform/demo-s3
        run: terraform apply -auto-approve -input=false
