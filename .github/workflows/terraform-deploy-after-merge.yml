name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

  CMDB_CI_NAME: ${{ vars.CMDB_CI_NAME }}

jobs:
  deploy:
    name: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5

      - name: Extract PR number from merge commit
        id: pr_info
        shell: bash
        run: |
          PR_NUMBER=$(echo "${{ github.event.head_commit.message }}" | grep -oE '#[0-9]+' | head -1 | tr -d '#')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR number not found in merge commit message."
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get approved PR head SHA
        id: approved_sha
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr_info.outputs.pr_number }}");

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            core.setOutput("approved_commit_sha", pr.head.sha);

      - name: Validate ServiceNow approval before production deployment
        id: snow_gate
        shell: bash
        run: |
          RESPONSE=$(curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-approval-check" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"pr_number\": \"${{ steps.pr_info.outputs.pr_number }}\",
              \"approved_commit_sha\": \"${{ steps.approved_sha.outputs.approved_commit_sha }}\",
              \"merge_commit_sha\": \"${{ github.sha }}\",
              \"status_context\": \"snow-approval\",
              \"deployment_gate_context\": \"snow-deployment-gate\",
              \"cmdb_ci_name\": \"${CMDB_CI_NAME}\",
              \"deployment_environment\": \"production\",
              \"deployment_pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"deployment_run_id\": \"${{ github.run_id }}\"
            }")

          echo "$RESPONSE" > snow_gate_response.json
          cat snow_gate_response.json

          python3 - <<'PY'
          import json, sys, os

          with open("snow_gate_response.json", "r") as f:
              data = json.load(f)

          result = data.get("result", data)

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"deployment_check_status={result.get('deployment_check_status', '')}\n")
              out.write(f"deployment_check_timestamp={result.get('deployment_check_timestamp', '')}\n")
              out.write(f"merge_commit_sha={result.get('merge_commit_sha', '')}\n")
              check_result = str(result.get("deployment_check_result", "")).replace("\n", " ").replace('"', "'")
              out.write(f"deployment_check_result={check_result}\n")

          if (
              result.get("approved") is True
              and result.get("approval_state") == "approved"
              and result.get("sha_match") is True
              and result.get("context_match") is True
          ):
              print("ServiceNow deployment gate passed.")
              sys.exit(0)

          print("ServiceNow deployment gate failed.")
          print(result)
          sys.exit(1)
          PY

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan before deploy
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Terraform plan
        working-directory: terraform/demo-s3
        run: terraform plan -input=false -no-color | tee terraform-plan.txt

      - name: Build Terraform plan summary
        id: plan_summary
        shell: bash
        run: |
          SUMMARY=$(grep -E "Plan:|No changes" terraform/demo-s3/terraform-plan.txt | tail -1 | sed 's/"/'\''/g')
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Terraform plan completed before production apply."
          fi
          echo "terraform_plan_summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        working-directory: terraform/demo-s3
        run: terraform apply -auto-approve -input=false

      - name: Notify ServiceNow deployment success
        if: success()
        run: |
          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"pr_number\": \"${{ steps.pr_info.outputs.pr_number }}\",
              \"approved_commit_sha\": \"${{ steps.approved_sha.outputs.approved_commit_sha }}\",
              \"merge_commit_sha\": \"${{ github.sha }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"cmdb_ci_name\": \"${CMDB_CI_NAME}\",
              \"terraform_plan_summary\": \"${{ steps.plan_summary.outputs.terraform_plan_summary }}\",
              \"deployment_check_status\": \"${{ steps.snow_gate.outputs.deployment_check_status }}\",
              \"deployment_check_timestamp\": \"${{ steps.snow_gate.outputs.deployment_check_timestamp }}\",
              \"deployment_check_result\": \"${{ steps.snow_gate.outputs.deployment_check_result }}\",
              \"deployment_status\": \"success\",
              \"deployment_environment\": \"production\",
              \"deployment_pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"deployment_run_id\": \"${{ github.run_id }}\",
              \"deployment_timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"

      - name: Notify ServiceNow deployment failure
        if: failure()
        run: |
          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -d "{
              \"shared_secret\": \"${SN_GITHUB_SHARED_SECRET}\",
              \"repo_name\": \"${{ github.repository }}\",
              \"pr_number\": \"${{ steps.pr_info.outputs.pr_number }}\",
              \"approved_commit_sha\": \"${{ steps.approved_sha.outputs.approved_commit_sha }}\",
              \"merge_commit_sha\": \"${{ github.sha }}\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"cmdb_ci_name\": \"${CMDB_CI_NAME}\",
              \"terraform_plan_summary\": \"${{ steps.plan_summary.outputs.terraform_plan_summary }}\",
              \"deployment_check_status\": \"${{ steps.snow_gate.outputs.deployment_check_status }}\",
              \"deployment_check_timestamp\": \"${{ steps.snow_gate.outputs.deployment_check_timestamp }}\",
              \"deployment_check_result\": \"${{ steps.snow_gate.outputs.deployment_check_result }}\",
              \"deployment_status\": \"failure\",
              \"deployment_environment\": \"production\",
              \"deployment_pipeline_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"deployment_run_id\": \"${{ github.run_id }}\",
              \"deployment_timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"
