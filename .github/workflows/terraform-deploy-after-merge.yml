name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  TF_IN_AUTOMATION: true

jobs:

  deploy-prod-s3:

    name: deploy-prod-s3

    runs-on: ubuntu-latest

    environment: production

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ##################################################
      # AWS OIDC Assume Role
      ##################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      ##################################################
      # Terraform
      ##################################################

      - name: Terraform Init
        working-directory: terraform/environments/prod/s3
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/prod/s3
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/prod/s3
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod/s3
        run: terraform apply -auto-approve tfplan

  deploy-prod-ec2:

    name: deploy-prod-ec2

    needs:
      - deploy-prod-s3

    runs-on: ubuntu-latest

    environment: production

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/environments/prod/ec2
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/prod/ec2
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/prod/ec2
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod/ec2
        run: terraform apply -auto-approve tfplan

  notify-snow-success:

    name: notify-snow-success

    needs:
      - deploy-prod-s3
      - deploy-prod-ec2

    if: success()

    runs-on: ubuntu-latest

    steps:

      - name: Notify ServiceNow
        run: |
          cat > payload.json << EOF
          {
            "event_type":"deployment_result",
            "deployment_status":"success",
            "environment":"production",
            "repository":"${{ github.repository }}",
            "commit_sha":"${{ github.sha }}",
            "pipeline_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          curl \
            -u "${{ secrets.SN_API_USER }}:${{ secrets.SN_API_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.SN_INSTANCE_URL }}${{ secrets.SN_DEPLOYMENT_CALLBACK_PATH }}"

  notify-snow-failure:

    name: notify-snow-failure

    if: failure()

    runs-on: ubuntu-latest

    steps:

      - name: Notify ServiceNow
        run: |
          cat > payload.json << EOF
          {
            "event_type":"deployment_result",
            "deployment_status":"failed",
            "environment":"production",
            "repository":"${{ github.repository }}",
            "commit_sha":"${{ github.sha }}"
          }
          EOF

          curl \
            -u "${{ secrets.SN_API_USER }}:${{ secrets.SN_API_PASSWORD }}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "${{ secrets.SN_INSTANCE_URL }}${{ secrets.SN_DEPLOYMENT_CALLBACK_PATH }}"
