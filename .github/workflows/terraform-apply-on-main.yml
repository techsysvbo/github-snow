name: Terraform Apply on Main

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"

permissions:
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform/demo-s3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Uses static AWS access key/secret stored in GitHub Actions secrets.
      # This matches what you said you updated today.
      - name: Configure AWS credentials using access keys
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -auto-approve
