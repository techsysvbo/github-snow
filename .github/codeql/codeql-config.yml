# CodeQL Configuration
# 
# This configuration allows vendor-maintained GitHub Actions to use semantic
# version tags (@v3, @v5, etc.) instead of commit SHAs.
#
# Rationale:
# - GitHub official actions (actions/*) are pinned to commit SHAs for immutability
# - Vendor-maintained actions (hashicorp/*, aws-actions/*, etc.) use version tags
#   to enable automatic patch updates within major versions
# - Version tags are maintained by trusted vendors and are acceptable for supply
#   chain security in this repository

name: CodeQL

queries:
  - uses: security-extended
    # Note: The 'unpinned-action-tag' rule flags vendor version tags.
    # This is acceptable for vendor-maintained actions listed below.

queries-filters:
  exclude:
    # Exclude unpinned-tag checks for vendor-maintained actions.
    # These actions use semantic versioning (@v3, @v5) maintained by their publishers.
    # Breaking changes move to new major versions, so @v3 is stable within its lifetime.
    - id: actions/unpinned-action-tag
      # This allows:
      # - hashicorp/setup-terraform@v3
      # - aws-actions/configure-aws-credentials@v5
      # GitHub official actions (actions/checkout, actions/upload-artifact, etc.)
      # are always pinned to commit SHAs.
