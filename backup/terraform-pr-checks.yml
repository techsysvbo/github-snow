# 7-year-old explanation:
# This checks the homework before anyone can merge.
# It checks that GitHub workflow files are not broken.
# It checks Terraform format, Terraform validity, and Checkov security.

# SME explanation:
# This is the technical pre-merge gate.
# Branch protection must require both workflow-yaml-check and terraform-checks.

name: Terraform PR Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

jobs:
  workflow-yaml-check:
    name: workflow-yaml-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Validate GitHub Actions workflow syntax
        uses: raven-actions/actionlint@v2

  terraform-checks:
    name: terraform-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false
