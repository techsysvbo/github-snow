# 7-year-old explanation:
# This only runs after the code is already approved and merged.
# It builds the AWS resource and tells ServiceNow if deployment worked.

# SME explanation:
# Production deployment is post-merge only.
# Pre-merge approval is enforced by branch protection and the GitHub App environment gate.
# This workflow performs Terraform apply and sends deployment result back to SNOW.

name: Terraform Deploy After Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false

  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}

  SN_INSTANCE_URL: ${{ secrets.SN_INSTANCE_URL }}
  SN_API_USER: ${{ secrets.SN_API_USER }}
  SN_API_PASSWORD: ${{ secrets.SN_API_PASSWORD }}
  SN_GITHUB_SHARED_SECRET: ${{ secrets.SN_GITHUB_SHARED_SECRET }}

  CMDB_CI_NAME: ${{ vars.CMDB_CI_NAME }}

jobs:
  deploy:
    name: terraform-apply
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5

      - name: Extract PR number from merge commit
        id: pr_info
        shell: bash
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PR_NUMBER=$(echo "$HEAD_COMMIT_MESSAGE" | grep -oE '#[0-9]+' | head -1 | tr -d '#')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR number not found in merge commit message."
            exit 1
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Get approved PR head SHA
        id: approved_sha
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number("${{ steps.pr_info.outputs.pr_number }}");

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            core.setOutput("approved_commit_sha", pr.head.sha);

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        working-directory: terraform/demo-s3
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform/demo-s3
        run: terraform init -input=false

      - name: Terraform validate
        working-directory: terraform/demo-s3
        run: terraform validate

      - name: Checkov security scan before deploy
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/demo-s3
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Terraform plan
        working-directory: terraform/demo-s3
        run: terraform plan -input=false -no-color | tee terraform-plan.txt

      - name: Build Terraform plan summary
        id: plan_summary
        shell: bash
        run: |
          SUMMARY=$(grep -E "Plan:|No changes" terraform/demo-s3/terraform-plan.txt | tail -1 | sed 's/"/'\''/g')
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Terraform plan completed before production apply."
          fi
          echo "terraform_plan_summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Terraform apply
        working-directory: terraform/demo-s3
        run: terraform apply -auto-approve -input=false

      - name: Notify ServiceNow deployment success
        if: success()
        env:
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          APPROVED_COMMIT_SHA: ${{ steps.approved_sha.outputs.approved_commit_sha }}
          MERGE_COMMIT_SHA: ${{ github.sha }}
          TERRAFORM_PLAN_SUMMARY: ${{ steps.plan_summary.outputs.terraform_plan_summary }}
          DEPLOYMENT_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOYMENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "shared_secret": os.environ["SN_GITHUB_SHARED_SECRET"],
              "repo_name": os.environ["REPO_NAME"],
              "pr_number": os.environ["PR_NUMBER"],
              "approved_commit_sha": os.environ["APPROVED_COMMIT_SHA"],
              "merge_commit_sha": os.environ["MERGE_COMMIT_SHA"],
              "commit_sha": os.environ["MERGE_COMMIT_SHA"],
              "cmdb_ci_name": os.environ.get("CMDB_CI_NAME", ""),
              "terraform_plan_summary": os.environ.get("TERRAFORM_PLAN_SUMMARY", ""),
              "deployment_status": "success",
              "deployment_environment": "production",
              "deployment_pipeline_url": os.environ["DEPLOYMENT_PIPELINE_URL"],
              "deployment_run_id": os.environ["DEPLOYMENT_RUN_ID"],
              "deployment_timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("deployment_result_payload.json", "w") as f:
              json.dump(payload, f)
          PY

          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            --data @deployment_result_payload.json

      - name: Notify ServiceNow deployment failure
        if: failure()
        env:
          REPO_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr_info.outputs.pr_number }}
          APPROVED_COMMIT_SHA: ${{ steps.approved_sha.outputs.approved_commit_sha }}
          MERGE_COMMIT_SHA: ${{ github.sha }}
          TERRAFORM_PLAN_SUMMARY: ${{ steps.plan_summary.outputs.terraform_plan_summary }}
          DEPLOYMENT_PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DEPLOYMENT_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          payload = {
              "shared_secret": os.environ["SN_GITHUB_SHARED_SECRET"],
              "repo_name": os.environ.get("REPO_NAME", ""),
              "pr_number": os.environ.get("PR_NUMBER", ""),
              "approved_commit_sha": os.environ.get("APPROVED_COMMIT_SHA", ""),
              "merge_commit_sha": os.environ.get("MERGE_COMMIT_SHA", ""),
              "commit_sha": os.environ.get("MERGE_COMMIT_SHA", ""),
              "cmdb_ci_name": os.environ.get("CMDB_CI_NAME", ""),
              "terraform_plan_summary": os.environ.get("TERRAFORM_PLAN_SUMMARY", ""),
              "deployment_status": "failure",
              "deployment_environment": "production",
              "deployment_pipeline_url": os.environ.get("DEPLOYMENT_PIPELINE_URL", ""),
              "deployment_run_id": os.environ.get("DEPLOYMENT_RUN_ID", ""),
              "deployment_timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          }

          with open("deployment_result_payload.json", "w") as f:
              json.dump(payload, f)
          PY

          curl -sS -X POST "${SN_INSTANCE_URL}/api/x_2000997_github_0/github_pr_approval/deployment-result" \
            -u "${SN_API_USER}:${SN_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            --data @deployment_result_payload.json
